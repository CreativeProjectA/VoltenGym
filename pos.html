<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volten Gym — Punto de Venta</title>
<link rel="manifest" href="manifest-pos.json">
<link rel="icon" type="image/png" href="voltengym.png">
<link rel="apple-touch-icon" href="voltengym.png">
<meta name="theme-color" content="#F97316">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --orange:#F97316; --orange-soft:#FFF4EC; --orange-dark:#EA580C;
    --ink:#111111; --muted:#6B7280; --line:#ECECEC;
    --bg:#FAFAFA; --card:#FFFFFF; --dark:#161616; --gray:#F5F5F5;
    --green:#22C55E; --red:#EF4444; --amber:#F59E0B;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',-apple-system,'SF Pro Display','Segoe UI',sans-serif;}
  body{background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  button{cursor:pointer;font-family:inherit;border:none;background:none;transition:all .22s cubic-bezier(.34,1.2,.64,1);}
  input,select,textarea{font-family:inherit;outline:none;}
  .hidden{display:none!important;}
  ::-webkit-scrollbar{width:9px;height:9px;} ::-webkit-scrollbar-thumb{background:#E2E2E2;border-radius:5px;} ::-webkit-scrollbar-thumb:hover{background:#D0D0D0;}

  .btn{height:48px;padding:0 24px;border-radius:100px;font-size:15px;font-weight:600;letter-spacing:-0.01em;display:inline-flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap;}
  .btn:active{transform:scale(.95);}
  .btn-primary{background:var(--orange);color:#FFF;} .btn-primary:hover{background:var(--orange-dark);transform:translateY(-2px);box-shadow:0 10px 24px rgba(249,115,22,.3);}
  .btn-dark{background:var(--ink);color:#FFF;} .btn-dark:hover{background:#000;transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.18);}
  .btn-ghost{background:#FFF;color:var(--ink);border:1.5px solid var(--line);} .btn-ghost:hover{border-color:var(--orange);color:var(--orange-dark);background:var(--orange-soft);transform:translateY(-1px);}
  .btn-danger{background:#FEE2E2;color:#DC2626;} .btn-danger:hover{background:#FECACA;transform:translateY(-1px);}
  .btn-sm{height:38px;padding:0 16px;font-size:13px;border-radius:100px;}
  .btn-xs{height:30px;padding:0 12px;font-size:12px;border-radius:100px;font-weight:600;}
  .btn-block{width:100%;}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important;}

  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em;}
  .inp{width:100%;height:50px;padding:0 16px;border-radius:14px;border:1.5px solid var(--line);font-size:15px;font-weight:500;background:#FFF;transition:border .2s,box-shadow .2s;}
  .inp:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(249,115,22,.08);}
  select.inp{cursor:pointer;}
  textarea.inp{height:auto;padding:13px 16px;line-height:1.6;resize:vertical;}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

  /* LOGIN */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;}
  .login-card{background:var(--card);border-radius:28px;padding:44px;width:430px;box-shadow:0 24px 70px rgba(0,0,0,.07);}
  .login-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px;}
  .login-logo svg{width:32px;height:32px;} .login-logo span{font-size:17px;font-weight:800;letter-spacing:0.08em;}
  .login-card h1{font-size:30px;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px;text-align:center;}
  .login-card .lead{color:var(--muted);font-size:15px;font-weight:500;margin-bottom:26px;text-align:center;}
  .login-err{color:var(--red);font-size:13px;font-weight:600;margin-bottom:12px;text-align:center;min-height:18px;}

  /* SHELL */
  #shell{display:none;grid-template-columns:250px 1fr;height:100vh;}
  .sidebar{background:var(--card);border-right:1px solid var(--line);padding:26px 16px;display:flex;flex-direction:column;overflow-y:auto;}
  .side-logo{display:flex;align-items:center;gap:11px;padding:0 10px 24px;}
  .side-logo svg{width:30px;height:30px;} .side-logo b{font-size:16px;font-weight:800;letter-spacing:0.07em;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;font-size:14px;font-weight:600;color:var(--muted);margin-bottom:3px;width:100%;text-align:left;}
  .nav-item:hover{background:var(--orange-soft);color:var(--orange-dark);transform:translateX(2px);}
  .nav-item:active{transform:scale(.97);}
  .nav-item.active{background:var(--orange);color:#FFF;box-shadow:0 6px 16px rgba(249,115,22,.25);}
  .nav-item svg{width:19px;height:19px;flex-shrink:0;stroke-width:2;}
  .nav-sep{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.13em;color:#C8C8C8;padding:18px 14px 8px;}
  .side-foot{margin-top:auto;padding-top:16px;}
  .shift-chip{background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:13px 15px;margin-bottom:10px;}
  .shift-chip .t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);}
  .shift-chip .v{font-size:19px;font-weight:700;letter-spacing:-0.02em;margin-top:3px;}
  .side-user{padding:12px 14px;border-radius:16px;background:var(--bg);display:flex;align-items:center;gap:11px;}
  .side-user .av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#F97316,#EA580C);display:flex;align-items:center;justify-content:center;color:#FFF;font-weight:800;font-size:15px;flex-shrink:0;overflow:hidden;}
  .side-user .av img{width:100%;height:100%;object-fit:cover;}
  .side-user .nm{font-size:13px;font-weight:700;} .side-user .rl{font-size:11px;color:var(--muted);text-transform:capitalize;margin-top:1px;}

  .main{overflow-y:auto;padding:36px 44px;}
  .topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:30px;gap:20px;flex-wrap:wrap;}
  .topbar h1{font-size:36px;font-weight:700;letter-spacing:-0.035em;line-height:1.05;}
  .topbar .sub{color:var(--muted);font-size:15px;font-weight:500;margin-top:6px;}
  .branch-pick select{height:44px;padding:0 16px;border-radius:12px;border:1.5px solid var(--line);font-size:13px;font-weight:600;background:#FFF;cursor:pointer;transition:border .2s;}
  .branch-pick select:hover{border-color:var(--orange);}

  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
  .card{background:var(--card);border-radius:22px;padding:24px 26px;box-shadow:0 1px 3px rgba(0,0,0,.03);transition:transform .2s ease;}
  .card:hover{transform:translateY(-3px);}
  .card .lbl{font-size:13px;color:var(--muted);font-weight:600;display:flex;align-items:center;justify-content:space-between;}
  .card .dot{width:9px;height:9px;border-radius:50%;}
  .card .val{font-size:34px;font-weight:700;letter-spacing:-0.035em;margin-top:14px;line-height:1;}
  .mini-ch{height:46px;margin-top:12px;}
  .mini-ch svg{width:100%;height:100%;display:block;}
  .chart-toggle{display:inline-flex;background:#F3F4F6;border-radius:100px;padding:3px;gap:2px;}
  .chart-toggle button{border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:700;padding:6px 14px;border-radius:100px;cursor:pointer;font-family:inherit;}
  .chart-toggle button.on{background:#FFF;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .card .foot{font-size:13px;color:var(--muted);margin-top:9px;font-weight:500;}

  .panel{background:var(--card);border-radius:22px;padding:28px;box-shadow:0 1px 3px rgba(0,0,0,.03);margin-bottom:16px;}
  .panel h2{font-size:21px;font-weight:700;letter-spacing:-0.02em;margin-bottom:3px;}
  .panel .psub{font-size:14px;color:var(--muted);font-weight:500;margin-bottom:20px;}
  /* Panel de acento (flujo de caja) — naranja, ya no negro */
  .dark-panel{background:linear-gradient(135deg,#F97316 0%,#EA580C 100%);color:#FFF;box-shadow:0 14px 34px rgba(249,115,22,.28);}
  .dark-panel h2{color:#FFF;}
  .row-line{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);transition:background .2s;}
  .row-line:last-child{border-bottom:none;}
  .row-line .k{color:var(--muted);font-size:14px;font-weight:500;} .row-line .v{font-weight:700;font-size:15px;}
  .dark-panel .row-line{border-color:rgba(255,255,255,.18);} .dark-panel .k{color:rgba(255,255,255,.8);} .dark-panel .v{color:#FFF;}

  /* Tablas — encabezado gris suave (ya no negro) */
  table{width:100%;border-collapse:collapse;}
  thead tr{background:var(--gray);}
  th{text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);padding:13px 14px;}
  th:first-child{border-radius:12px 0 0 12px;} th:last-child{border-radius:0 12px 12px 0;}
  td{padding:14px;font-size:14px;font-weight:500;border-bottom:1px solid #F4F4F4;}
  tr:last-child td{border-bottom:none;}
  tbody tr{transition:background .18s;}
  tbody tr:hover td{background:#FAFAFA;}
  .tag{display:inline-block;padding:5px 12px;border-radius:100px;font-size:12px;font-weight:600;white-space:nowrap;}
  .tag-green{background:#DCFCE7;color:#16A34A;} .tag-orange{background:var(--orange-soft);color:var(--orange);}
  .tag-red{background:#FEE2E2;color:#DC2626;} .tag-gray{background:#F3F4F6;color:#6B7280;}
  .tag-dark{background:var(--ink);color:#FFF;}

  .stub{text-align:center;padding:60px 20px;color:var(--muted);}
  .stub .st{font-size:17px;font-weight:700;color:#374151;margin-bottom:8px;}
  .stub p{max-width:440px;margin:0 auto;line-height:1.65;font-weight:500;}

  /* GATE turno */
  #gate{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:var(--bg);z-index:90;}
  .gate-card{background:#F4F4F5;border-radius:30px;padding:44px 42px;width:460px;}
  .gate-card h1{font-size:30px;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px;}
  .gate-card .who{color:var(--muted);font-size:16px;font-weight:500;margin-bottom:30px;}
  .gate-card .who b{color:var(--ink);font-weight:700;}
  .lab-up{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:#9CA3AF;margin-bottom:10px;display:block;}
  .money-inp{display:flex;align-items:center;background:#FFF;border-radius:16px;height:58px;padding:0 20px;margin-bottom:20px;box-shadow:0 1px 2px rgba(0,0,0,.03);transition:box-shadow .2s;}
  .money-inp:focus-within{box-shadow:0 0 0 4px rgba(249,115,22,.12);}
  .money-inp .pre{color:#9CA3AF;font-weight:700;font-size:18px;margin-right:10px;}
  .money-inp input{flex:1;border:none;font-size:22px;font-weight:700;color:var(--ink);background:transparent;min-width:0;}
  .money-inp .suf{color:#9CA3AF;font-weight:700;font-size:13px;letter-spacing:0.05em;}
  .gate-card .btn-primary{height:56px;font-size:16px;margin-top:6px;}
  .gate-date{text-align:center;margin-top:18px;font-size:13px;color:var(--muted);font-weight:500;}

  /* STEPPER (como Lavapower) */
  .stepper{display:flex;gap:6px;background:#FFF;border:1px solid var(--line);border-radius:100px;padding:6px;align-items:center;}
  .step-pill{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;transition:all .3s cubic-bezier(.34,1.2,.64,1);}
  .step-pill .n{width:20px;height:20px;border-radius:50%;background:#EFEFEF;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;transition:all .3s;}
  .step-pill.on{background:var(--orange);color:#FFF;box-shadow:0 4px 12px rgba(249,115,22,.3);}
  .step-pill.on .n{background:rgba(255,255,255,.25);color:#FFF;}
  .step-pill.done .n{background:var(--orange-soft);color:var(--orange-dark);}

  /* Venta */
  .sale-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;align-items:start;}
  .pick-tabs{display:flex;gap:8px;margin-bottom:18px;}
  .pick-tab{padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;background:var(--gray);color:var(--muted);}
  .pick-tab:hover{background:#EDEDED;transform:translateY(-1px);}
  .pick-tab.on{background:var(--orange);color:#FFF;box-shadow:0 4px 12px rgba(249,115,22,.25);}
  .prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .prod-card{background:var(--gray);border-radius:16px;padding:16px;text-align:left;border:2px solid transparent;transition:all .22s cubic-bezier(.34,1.2,.64,1);}
  .prod-card:hover{border-color:var(--orange);background:#FFF;transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.07);}
  .prod-card:active{transform:scale(.96);}
  .prod-card .pn{font-size:13.5px;font-weight:600;line-height:1.3;margin-bottom:6px;}
  .prod-card .pp{font-size:16px;font-weight:800;color:var(--orange);}
  .prod-card .ps{font-size:11px;color:var(--muted);font-weight:600;margin-top:4px;}
  .cart-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line);animation:fadeUp .3s both;}
  .cart-item .cn{flex:1;font-size:13.5px;font-weight:600;line-height:1.3;}
  .cart-item .cq{display:flex;align-items:center;gap:8px;}
  .cart-item .cq button{width:26px;height:26px;border-radius:50%;background:var(--gray);font-size:15px;font-weight:800;color:var(--ink);}
  .cart-item .cq button:hover{background:var(--orange);color:#FFF;transform:scale(1.12);}
  .cart-item .cp{font-size:14px;font-weight:800;min-width:70px;text-align:right;}
  .method-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
  .method-card{background:var(--gray);border-radius:16px;padding:16px 12px;text-align:center;border:2px solid transparent;font-size:13.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted);transition:all .25s cubic-bezier(.34,1.4,.64,1);}
  .method-card svg{width:22px;height:22px;stroke-width:1.8;}
  .method-card:hover{transform:translateY(-3px);border-color:#FFD9BE;background:#FFF;box-shadow:0 8px 20px rgba(0,0,0,.06);}
  .method-card:active{transform:scale(.95);}
  .method-card.on{border-color:var(--orange);background:var(--orange-soft);color:var(--orange-dark);transform:scale(1.04);box-shadow:0 8px 22px rgba(249,115,22,.18);}

  /* Búsqueda cliente */
  .cust-row{display:flex;align-items:center;gap:14px;padding:13px 14px;border-radius:14px;width:100%;text-align:left;border:2px solid transparent;background:var(--gray);margin-bottom:8px;transition:all .22s cubic-bezier(.34,1.2,.64,1);}
  .cust-row:hover{border-color:var(--orange);background:#FFF;transform:translateX(4px);box-shadow:0 6px 18px rgba(0,0,0,.05);}
  .cust-row:active{transform:scale(.98);}
  .cust-row .av2{width:38px;height:38px;border-radius:50%;background:#E5E7EB;color:#6B7280;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;overflow:hidden;}
  .cust-row .cd{flex:1;} .cust-row .cd b{font-size:14px;display:block;} .cust-row .cd span{font-size:12px;color:var(--muted);font-weight:500;}

  /* MODAL */
  #modal-root{position:fixed;inset:0;background:rgba(17,17,17,.4);z-index:200;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 20px;backdrop-filter:blur(3px);}
  .modal{background:#FFF;border-radius:24px;padding:32px;width:560px;max-width:100%;animation:popIn .35s cubic-bezier(.34,1.3,.64,1) both;}
  .modal.wide{width:760px;}
  .modal h3{font-size:22px;font-weight:800;letter-spacing:-0.02em;margin-bottom:4px;}
  .modal .msub{font-size:14px;color:var(--muted);font-weight:500;margin-bottom:22px;}
  .modal-x{float:right;width:34px;height:34px;border-radius:50%;background:var(--gray);font-size:16px;font-weight:700;color:var(--muted);}
  .modal-x:hover{background:var(--orange-soft);color:var(--orange-dark);transform:rotate(90deg);}

  /* TOAST */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#FFF;padding:14px 26px;border-radius:100px;font-size:14px;font-weight:600;z-index:300;opacity:0;transition:all .35s cubic-bezier(.34,1.3,.64,1);box-shadow:0 12px 30px rgba(0,0,0,.25);max-width:90vw;}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  #toast.err{background:#DC2626;}

  /* Acceso — panel gris suave (ya no negro) */
  .scan-box{background:var(--gray);border:1px solid var(--line);border-radius:22px;padding:28px;color:var(--ink);margin-bottom:16px;}
  .scan-box .inp{background:#FFF;border-color:transparent;color:var(--ink);height:58px;font-size:17px;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .scan-box .inp::placeholder{color:#B9BDC5;}
  .scan-box .inp:focus{border-color:var(--orange);}
  #access-result{border-radius:22px;padding:34px;text-align:center;margin-bottom:16px;display:none;animation:popIn .4s cubic-bezier(.34,1.4,.64,1) both;}
  #access-result.ok{background:#DCFCE7;} #access-result.deny{background:#FEE2E2;}
  #access-result .big{font-size:28px;font-weight:700;letter-spacing:-0.03em;}
  #access-result.ok .big{color:#15803D;} #access-result.deny .big{color:#DC2626;}
  #access-result .who2{font-size:17px;font-weight:700;margin-top:8px;color:var(--ink);}
  #access-result .why{font-size:14px;font-weight:600;margin-top:5px;color:var(--muted);}

  .offline-badge{position:fixed;bottom:18px;left:18px;background:#FEF3C7;color:#92400E;font-size:12px;font-weight:700;padding:9px 15px;border-radius:100px;z-index:150;display:none;box-shadow:0 4px 14px rgba(0,0,0,.08);}

  .range-pills{display:flex;gap:6px;background:#FFF;border:1px solid var(--line);border-radius:100px;padding:5px;}
  .range-pill{padding:8px 18px;border-radius:100px;font-size:12px;font-weight:700;letter-spacing:.05em;color:var(--muted);}
  .range-pill:hover{background:var(--orange-soft);color:var(--orange-dark);}
  .range-pill.on{background:var(--orange);color:#FFF;box-shadow:0 4px 10px rgba(249,115,22,.25);}

  .toggle{position:relative;width:46px;height:26px;border-radius:100px;background:#E5E7EB;transition:background .2s;flex-shrink:0;}
  .toggle.on{background:var(--orange);}
  .toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#FFF;transition:left .22s cubic-bezier(.34,1.4,.64,1);box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .toggle.on::after{left:23px;}

  .search-wrap{position:relative;flex:1;max-width:420px;}
  .search-wrap .inp{padding-left:42px;}
  .search-wrap svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:#9CA3AF;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes popIn{from{opacity:0;transform:scale(.92) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
  .fade{animation:fadeUp .4s cubic-bezier(.25,.46,.45,.94) both;}

  /* ── Entradas suaves (ligeras, sin trabar) ── */
  .main .panel{animation:fadeUp .3s ease both;}

  /* avatar genérico (foto o inicial) */
  .av2{width:38px;height:38px;border-radius:50%;background:#E5E7EB;color:#6B7280;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;overflow:hidden;}
  .av2 img{width:100%;height:100%;object-fit:cover;}
  @media(max-width:1100px){.cards{grid-template-columns:repeat(2,1fr);} .sale-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card fade">
    <div class="login-logo"><svg viewBox="0 0 28 28" fill="none"><path d="M16 2L7 15h8l-3 11L22 13h-8z" fill="#F97316"></path></svg><span>VOLTEN GYM</span></div>
    <h1>Punto de venta</h1>
    <p class="lead">Acceso para personal del gimnasio.</p>
    <div class="login-err" id="login-err"></div>
    <div class="field"><label>Usuario</label><input class="inp" id="li-user" placeholder="tu usuario o correo" autocomplete="username"></div>

/* ═══════════════ NÚCLEO ═══════════════ */

function toast(msg,err){const t=$('toast');t.textContent=msg;t.className=err?'err show':'show';clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),3200);}

function csvExport(name,headers,rows){
  const q=(v)=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const body=[headers.map(q).join(',')].concat(rows.map(r=>r.map(q).join(','))).join('\r\n');
  const blob=new Blob(['﻿'+body],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name+'_'+todayISO()+'.csv';a.click();
}
function waLink(phone,text){
  const p=String(phone||'').replace(/\D/g,'');
  const full=p.length===10?'52'+p:p;
  return 'https://wa.me/'+full+'?text='+encodeURIComponent(text);
}
const isNetErr=(e)=>e&&/fetch|network|failed|load/i.test(String(e.message||e));

/* ── Cache local (para leer sin internet) ── */
const cset=(k,v)=>{try{localStorage.setItem('vgpos_'+k,JSON.stringify(v));}catch(e){}};
const cget=(k)=>{try{return JSON.parse(localStorage.getItem('vgpos_'+k));}catch(e){return null;}};

/* ── Cola offline: escrituras pendientes ── */
const Q={
  key:'vgpos_queue',
  list(){try{return JSON.parse(localStorage.getItem(this.key))||[];}catch(e){return[];}},
  save(l){localStorage.setItem(this.key,JSON.stringify(l));this.badge();},
  push(op){const l=this.list();l.push(op);this.save(l);},
  badge(){
    const n=this.list().length,b=$('offline');
    if(!navigator.onLine){b.style.display='block';b.textContent='● Sin conexión'+(n?' — '+n+' operación(es) por sincronizar':' — guardando local');}
    else if(n){b.style.display='block';b.textContent='⟳ Sincronizando '+n+' operación(es)...';}
    else b.style.display='none';
  },
  async insert(table,payload){
    if(navigator.onLine){
      try{
        const {error}=await sb.from(table).insert(payload);
        if(!error)return{ok:true};
        if(!isNetErr(error))return{error};
      }catch(e){if(!isNetErr(e))return{error:e};}
    }
    this.push({t:'insert',table,payload});
    return{queued:true};
  },
  async update(table,match,patch){
    if(navigator.onLine){
      try{
        let q=sb.from(table).update(patch);
        for(const k in match)q=match[k]===null?q.is(k,null):q.eq(k,match[k]);
        const {error}=await q;
        if(!error)return{ok:true};
        if(!isNetErr(error))return{error};
      }catch(e){if(!isNetErr(e))return{error:e};}
    }
    this.push({t:'update',table,match,patch});
    return{queued:true};
  },
  // ajuste de stock: se re-aplica leyendo el valor actual al sincronizar
  async stockDelta(branch_id,product_id,delta,reason,staff_id){
    const moveId=uuid();
    if(navigator.onLine){
      try{
        const ok=await applyStockDelta(branch_id,product_id,delta,reason,staff_id,moveId);
        if(ok)return{ok:true};
      }catch(e){}
    }
    this.push({t:'stock',branch_id,product_id,delta,reason,staff_id,moveId});
    return{queued:true};
  },
  async flush(){
    if(!navigator.onLine)return;
    let l=this.list();
    while(l.length){
      const op=l[0];
      try{
        if(op.t==='insert'){
          const {error}=await sb.from(op.table).insert(op.payload);
          if(error&&isNetErr(error))break;
          if(error)console.warn('Op descartada',op,error.message);
        }else if(op.t==='update'){
          let q=sb.from(op.table).update(op.patch);
          for(const k in op.match)q=op.match[k]===null?q.is(k,null):q.eq(k,op.match[k]);
          const {error}=await q;
          if(error&&isNetErr(error))break;
          if(error)console.warn('Op descartada',op,error.message);
        }else if(op.t==='stock'){
          const ok=await applyStockDelta(op.branch_id,op.product_id,op.delta,op.reason,op.staff_id,op.moveId);
          if(!ok)break;
        }
      }catch(e){break;}
      l.shift();this.save(l);
    }
    this.badge();
  }
};
async function applyStockDelta(branch_id,product_id,delta,reason,staff_id,moveId){
  const {data:cur,error:e1}=await sb.from('stock').select('qty,min_qty').eq('branch_id',branch_id).eq('product_id',product_id).maybeSingle();
  if(e1&&isNetErr(e1))return false;
  const newQty=Number((cur&&cur.qty)||0)+delta;
  const {error:e2}=await sb.from('stock').upsert({branch_id,product_id,qty:newQty,min_qty:(cur&&cur.min_qty)||0});
  if(e2&&isNetErr(e2))return false;
  await sb.from('stock_moves').insert({id:moveId,branch_id,product_id,delta,reason,staff_id});
  return true;
}
window.addEventListener('online',()=>{Q.badge();Q.flush();});
window.addEventListener('offline',()=>Q.badge());

/* ═══════════════ POS ═══════════════ */
const Pos={
  user:null, role:null, profileName:'', branch:null, branches:[], nav:'dashboard', shift:null,
  plans:[], products:[], stock:[], customers:[], subs:[], promos:[], appProfiles:[], staffList:[], families:[], coachProfiles:[], requests:[],
  sale:null, custQuery:'', reportRange:'today', promoTab:'promos',

  async init(){
    Q.badge();
    const {data}=await sb.auth.getSession();
    if(data.session){await this.afterLogin(data.session);}
    $('li-btn').onclick=()=>this.login();

    document.querySelectorAll('.nav-item').forEach(b=>b.onclick=()=>this.go(b.dataset.nav));
  },

  async login(){
    const u=$('li-user').value.trim(),pass=$('li-pass').value;
    $('login-err').textContent='';
    if(!u||!pass){$('login-err').textContent='Escribe tu usuario y contraseña.';return;}
    $('li-btn').textContent='Entrando...';
    let session=null;
    for(const d of DOMAINS){
      if(u.includes('@')&&d)continue;
      const email=u.includes('@')?u:(u+d);
      if(!email.includes('@'))continue;
      const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
      if(!error){session=data.session;break;}
    }
    $('li-btn').textContent='Entrar';
    if(!session){$('login-err').textContent='Usuario o contraseña incorrectos.';return;}
    await this.afterLogin(session);
  },

  async afterLogin(session){
    this.user=session.user;
    // Sin internet: la sesión SÍ se restaura sola (Supabase la guarda en el
    // dispositivo), pero la consulta del perfil es de red — si falla aquí,
    // se usa el perfil guardado la última vez que sí hubo internet, en vez
    // de cerrar la sesión y dejar a la cajera sin poder ni entrar.
    const pk='cached_profile_'+this.user.id;
    let prof=null;
    try{
      const r=await sb.from('profiles').select('role,full_name,avatar_url').eq('id',this.user.id).single();
      if(r.data){prof=r.data;cset(pk,prof);}
      else if(isNetErr(r.error))prof=cget(pk);
    }catch(e){prof=cget(pk);}
    this.role=(prof&&prof.role)||'';
    if(!['admin','encargado','cajera','contador'].includes(this.role)){
      $('login-err').textContent=navigator.onLine?'Esta cuenta no tiene acceso al POS.':'Sin internet y sin sesión guardada en este dispositivo — conéctate una vez para poder entrar offline después.';
      if(navigator.onLine)await sb.auth.signOut();
      return;
    }
    this.profileName=(prof&&prof.full_name)||this.user.email.split('@')[0];
    $('su-name').textContent=this.profileName;
    $('su-role').textContent=ROLE_LABEL[this.role]||this.role;
    if(prof&&prof.avatar_url)$('su-av').innerHTML='<img src="'+esc(prof.avatar_url)+'" alt="">';
    else $('su-av').textContent=(this.profileName[0]||'A').toUpperCase();
    // permisos de navegación
    if(this.role!=='admin'){$('nav-staff').classList.add('hidden');$('nav-exercises').classList.add('hidden');}
    // Análisis/Reportes: SOLO admin y contador (cajeras y encargados ven inicio y gestión)
    if(!['admin','contador'].includes(this.role)){$('nav-reports').classList.add('hidden');$('sep-analisis').classList.add('hidden');}
    if(this.role==='contador'){
      // el contador SOLO ve reportes (cuenta para los contadores del dueño)
      document.querySelectorAll('.nav-item').forEach(b=>{if(b.dataset.nav!=='reports')b.classList.add('hidden');});
      document.querySelectorAll('.nav-sep').forEach(s=>s.classList.add('hidden'));
      $('shift-chip').classList.add('hidden');
      this.nav='reports';
    }
    await this.loadCore();
    // sucursal fija para no-admin (staff_branches), admin elige
    if(this.role!=='admin'){
      const {data:sbr}=await sb.from('staff_branches').select('branch_id').eq('staff_id',this.user.id).limit(1);
      const mine=sbr&&sbr[0]&&this.branches.find(b=>b.id===sbr[0].branch_id);
      this.branch=mine||this.branches[0]||null;
    }else{
      const saved=cget('branch_sel');
      this.branch=this.branches.find(b=>b.id===saved)||this.branches[0]||null;
    }
    $('login').style.display='none';
    await this.checkShiftGate();
  },

  async loadCore(){
    const load=async(key,q)=>{
      try{const {data,error}=await q;if(!error&&data){cset(key,data);return data;}}catch(e){}
      return cget(key)||[];
    };
    this.branches=await load('branches',sb.from('branches').select('*').order('name'));
    this.plans=await load('plans',sb.from('plans').select('*').order('duration_days'));
    this.products=await load('products',sb.from('products').select('*').order('name'));
    this.stock=await load('stock',sb.from('stock').select('*'));
    this.customers=await load('customers',sb.from('customers').select('*').order('full_name'));
    this.subs=await load('subs',sb.from('subscriptions').select('*').order('end_date',{ascending:false}));
    this.promos=await load('promos',sb.from('promotions').select('*').order('created_at',{ascending:false}));
    this.appProfiles=await load('appProfiles',sb.from('profiles').select('*'));
    this.families=await load('families',sb.from('families').select('*'));
    this.coachProfiles=await load('coachProfiles',sb.from('coach_profiles').select('profile_id,monthly_price'));
    this.staffBranches=await load('staffBranches',sb.from('staff_branches').select('*'));

  },
  // planes visibles en ESTA sucursal (branch_id null = aplica en ambas)
  plansForBranch(){
    const b=this.branch?this.branch.id:null;

  coachesForBranch(){
    const b=this.branch?this.branch.id:null;
    const byCoach={};(this.staffBranches||[]).forEach(x=>{(byCoach[x.staff_id]=byCoach[x.staff_id]||[]).push(x.branch_id);});
    return this.appProfiles.filter(p=>p.role==='coach'&&this.coachProfiles.find(x=>x.profile_id===p.id))

  /* ── Turno ── */

      $('gate').style.display='none';$('shell').style.display='grid';
      this.go('reports');return;
    }
    const bId=this.branch?this.branch.id:null;
    let shift=null;

      let q=sb.from('cash_shifts').select('*').eq('status','open').order('opened_at',{ascending:false}).limit(1);
      if(bId)q=q.eq('branch_id',bId);
      const {data}=await q;shift=(data&&data[0])||null;
      cset('shift_'+bId,shift);
    }catch(e){shift=cget('shift_'+bId);}
    this.shift=shift;
    if(!this.shift){
      $('shell').style.display='none';$('gate').style.display='flex';
      $('gate-hello').innerHTML='Bienvenido, <b>'+esc(this.profileName)+'</b>';
      $('gate-date').textContent=new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'})+' · '+ftime(new Date());
    }else{
      $('gate').style.display='none';$('shell').style.display='grid';
      this.go(this.nav||'dashboard');this.refreshChip();
    }
  },
  async openShift(){
    // Fondo fijo $400 — ya no se captura libremente. Si falta, se guarda el
    // aviso (fund_shortage) para que el administrador lo vea.
    const fundOk=$('fund-ok')&&$('fund-ok').checked;
    const cash=fundOk?400:(Number($('fund-real')&&$('fund-real').value)||0);
    const shortage=!fundOk;
    const fx=Number($('open-fx').value)||0;
    const bId=this.branch?this.branch.id:null;
    // id generado aquí para que las ventas puedan referenciar el turno aunque no haya internet
    const payload={id:uuid(),branch_id:bId,staff_id:this.user.id,opening_cash:cash,fx_rate:fx,status:'open',opened_at:new Date().toISOString()};
    if(shortage){payload.fund_shortage=true;payload.fund_shortage_note='Fondo real al abrir: '+money(cash)+' (faltan '+money(400-cash)+')';}
    if(navigator.onLine){
      let {error}=await sb.from('cash_shifts').insert(payload);
      if(error&&shortage&&/fund_shortage/i.test(error.message||'')){
        // Falta pos_migration7.sql — reintenta sin esas columnas para no bloquear el turno.
        const p2={...payload};delete p2.fund_shortage;delete p2.fund_shortage_note;
        const r2=await sb.from('cash_shifts').insert(p2);error=r2.error;
      }
      if(error&&!isNetErr(error)){toast('No se pudo abrir el turno: '+error.message,true);return;}
      if(error)Q.push({t:'insert',table:'cash_shifts',payload});
    }else{
      Q.push({t:'insert',table:'cash_shifts',payload});
      toast('Turno abierto SIN internet — se sincroniza solo al reconectar.');
    }
    this.shift=payload;cset('shift_'+bId,payload);
    cset('shift_sales',[]);cset('shift_movs',[]);
    $('gate').style.display='none';$('shell').style.display='grid';
    this.go('dashboard');this.refreshChip();
  },

  async shiftTotals(){
    let sales=[];let movs=[];
    try{
      const {data:sv}=await sb.from('sales').select('id,total,payment_method,created_at,customer_id,is_courtesy').eq('shift_id',this.shift.id).order('created_at',{ascending:false});
      sales=sv||[];cset('shift_sales',sales);
    }catch(e){sales=cget('shift_sales')||[];}
    try{
      const {data:mv}=await sb.from('cash_movements').select('*').eq('shift_id',this.shift.id).order('created_at',{ascending:false});
      movs=mv||[];cset('shift_movs',movs);
    }catch(e){movs=cget('shift_movs')||[];}
    const by=(m)=>sales.filter(x=>x.payment_method===m).reduce((s,x)=>s+Number(x.total||0),0);
    const movIn=movs.filter(m=>m.type==='in').reduce((s,x)=>s+Number(x.amount),0);
    const movOut=movs.filter(m=>m.type==='out').reduce((s,x)=>s+Number(x.amount),0);
    const cash=by('cash'),card=by('card'),transfer=by('transfer');
    const courtesies=sales.filter(x=>x.is_courtesy).length;
    return{sales,movs,cash,card,transfer,movIn,movOut,courtesies,
      total:cash+card+transfer,
      expected:Number(this.shift.opening_cash)+cash+movIn-movOut};
  },

  async refreshChip(){
    if(!this.shift){$('chip-cash').textContent='$0.00';return;}
    const t=await this.shiftTotals();
    $('chip-cash').textContent=money(t.expected);
  },

    if(navigator.onLine&&Q.list().length){toast('Sincronizando pendientes... intenta de nuevo en unos segundos.',true);Q.flush();return;}

    openModal(`

      <div class="row-line"><span class="k">Efectivo retirado</span><span class="v">−${money(t.movOut)}</span></div>
      <div class="row-line"><span class="k"><b>Efectivo esperado</b></span><span class="v" style="color:var(--orange)">${money(t.expected)}</span></div>
      <div class="row-line"><span class="k">Tarjeta</span><span class="v">${money(t.card)}</span></div>
      <div class="row-line"><span class="k">Transferencia</span><span class="v">${money(t.transfer)}</span></div>
      <div class="row-line"><span class="k">Órdenes del turno</span><span class="v">${t.sales.length}</span></div>
      <div class="field" style="margin-top:18px"><label>Efectivo contado (lo que hay físicamente)</label>
        <input class="inp" type="number" id="cs-counted" placeholder="0.00" oninput="Pos.diffLive(${t.expected})"></div>
      <div id="cs-diff" style="font-size:14px;font-weight:700;margin-bottom:16px;min-height:20px;"></div>
      <button class="btn btn-primary btn-block" onclick="Pos.doCloseShift(${t.expected})">Cerrar turno y hacer corte</button>

  diffLive(expected){
    const c=Number($('cs-counted').value);
    if(!$('cs-counted').value){$('cs-diff').textContent='';return;}
    const d=c-expected;
    $('cs-diff').innerHTML=d===0?'<span style="color:#16A34A">Caja cuadrada ✓</span>':
      (d>0?'<span style="color:#16A34A">Sobran '+money(d)+'</span>':'<span style="color:#DC2626">Faltan '+money(-d)+'</span>');
  },
  async doCloseShift(expected){
    const counted=Number($('cs-counted').value)||0;
    const t=await this.shiftTotals();
    const r=await Q.update('cash_shifts',{id:this.shift.id},{status:'closed',closed_at:new Date().toISOString(),expected_cash:expected,counted_cash:counted});
    if(r.error){toast('Error: '+r.error.message,true);return;}
    cset('shift_'+(this.branch?this.branch.id:null),null);
    // Cierre automático de accesos: quien entró y no marcó su salida (se le
    // olvidó escanear, o fue el último de la huella/facial) queda registrado
    // como salido a la hora de cerrar el gym en esta sucursal.
    if(navigator.onLine){
      try{
        const bId=this.branch?this.branch.id:null;
        let q=sb.from('checkins').select('id').eq('granted',true).is('checked_out_at',null).gte('created_at',todayISO()+'T00:00:00');
        if(bId)q=q.eq('branch_id',bId);
        const {data:openOnes}=await q;
        if(openOnes&&openOnes.length){
          await sb.from('checkins').update({checked_out_at:new Date().toISOString()}).in('id',openOnes.map(x=>x.id));
        }
      }catch(e){}
    }
    const resumen='CORTE DE CAJA — VOLTEN GYM\n'
      +(this.branch?this.branch.name+'\n':'')
      +new Date().toLocaleString('es-MX')+'\nCajero: '+this.profileName
      +'\n────────────────'
      +'\nÓrdenes: '+t.sales.length
      +(t.courtesies?'\nCortesías otorgadas: '+t.courtesies:'')
      +'\nEfectivo: '+money(t.cash)+'\nTarjeta: '+money(t.card)+'\nTransferencia: '+money(t.transfer)
      +'\nTotal ventas: '+money(t.total)
      +'\n────────────────'
      +'\nFondo: '+money(this.shift.opening_cash)
      +'\nEsperado en caja: '+money(expected)
      +'\nContado: '+money(counted)
      +'\nDiferencia: '+money(counted-expected);
    this._corte=resumen;
    // SEGURIDAD: el turno YA quedó cerrado en la base arriba (status:'closed').
    // La sesión se invalida de inmediato aquí mismo — sin esperar a que el
    // usuario le dé clic a "Terminar". Si cierra el modal con la tachita (o
    // cualquier otra forma), ya no puede seguir vendiendo con este turno:
    // el candado real es que this.shift deja de existir y checkShiftGate()
    // vuelve a pedir abrir turno.
    this.shift=null;
    cset('shift_'+(this.branch?this.branch.id:null),null);
    // La pantalla de fondo YA vuelve a "Iniciar turno" antes de abrir el modal
    // del corte — así, cierres el modal como lo cierres (tachita o Terminar),
    // detrás ya no hay acceso al POS, solo el gate de turno.
    await this.checkShiftGate();
    // El corte queda GUARDADO en cash_shifts (fondo, esperado, contado, diferencia,
    // hora de apertura/cierre). El admin/contador lo ve en Reportes → Historial de turnos.
    openModal(`
      <h3>Turno cerrado ✓</h3>
      <p class="msub">Resumen del corte</p>
      <pre style="background:var(--gray);border-radius:16px;padding:18px;font-size:13px;font-weight:600;line-height:1.7;white-space:pre-wrap;font-family:inherit;">${esc(resumen)}</pre>
      <div style="display:flex;gap:10px;margin-top:18px;">
        <button class="btn btn-ghost" style="flex:1" onclick="Pos.copyCorte()">Copiar corte</button>
        <button class="btn btn-primary" style="flex:1" onclick="closeModal();Pos.checkShiftGate();">Terminar</button>
      </div>
    `);
  },

  async ensureCustomerForProfile(profileId){
    let c=this.customers.find(x=>x.profile_id===profileId);
    if(c)return c;
    const p=this.appProfiles.find(x=>x.id===profileId);
    const payload={id:uuid(),full_name:(p&&(p.full_name||p.email))||'Cliente app',email:(p&&p.email)||null,phone:null,
      profile_id:profileId,branch_id:this.branch?this.branch.id:null,suspended:false,created_at:new Date().toISOString()};
    const r=await Q.insert('customers',payload);
    if(r.error){toast('Error: '+r.error.message,true);return null;}
    this.customers.unshift(payload);cset('customers',this.customers);
    return payload;

  async cobrarRequest(id){
    const r=this.requests.find(x=>x.id===id);if(!r)return;
    const c=await this.ensureCustomerForProfile(r.member_id);if(!c)return;
    this._reqId=id;
    if(r.type==='plan'){this.startSale(c.id,r.ref_id);}
    else{
      this.startSale(c.id);
      this.sale.step=2;this.go('sale');
      this.addCoachToCart(r.ref_id); // pregunta semana/mes antes de meterlo al carrito
    }
  },

    this.requests=this.requests.filter(x=>x.id!==id);cset('requests',this.requests);

  /* ── helpers de datos ── */
  subsOf(c){ // todas las subscripciones de un cliente (por ficha o por cuenta app)
    return this.subs.filter(s=>(c.id&&s.customer_id===c.id)||(c.profile_id&&s.member_id===c.profile_id));
  },
  bestSub(c){
    const list=this.subsOf(c).filter(s=>s.status!=='canceled');
    if(!list.length)return null;
    return list.reduce((a,b)=>a.end_date>b.end_date?a:b);
  },
  // Membresía SOLO válida en la sucursal donde se compró — un cliente que pagó
  // en Gómez Morín no puede entrar con esa membresía en Tres Cantos.
  bestSubForBranch(c,branchId){
    const list=this.subsOf(c).filter(s=>s.status!=='canceled'&&s.branch_id===branchId);
    if(!list.length)return null;
    return list.reduce((a,b)=>a.end_date>b.end_date?a:b);
  },
  // ¿Tiene membresía vigente en OTRA sucursal? (para el mensaje de rechazo)
  bestSubOtherBranch(c,branchId){
    const list=this.subsOf(c).filter(s=>s.status!=='canceled'&&s.branch_id&&s.branch_id!==branchId&&daysLeft(s.end_date)>=0);
    if(!list.length)return null;
    return list.reduce((a,b)=>a.end_date>b.end_date?a:b);
  },
  membershipTag(c){
    const s=this.bestSub(c);
    if(!s)return'<span class="tag tag-gray">Sin membresía</span>';
    const d=daysLeft(s.end_date);
    if(d<0)return'<span class="tag tag-red">Vencida '+fdate(s.end_date)+'</span>';
    if(d<=7)return'<span class="tag tag-orange">Vence en '+d+' día'+(d===1?'':'s')+'</span>';
    return'<span class="tag tag-green">Activa · hasta '+fdate(s.end_date)+'</span>';
  },

  custName(id){const c=this.customers.find(x=>x.id===id);return c?c.full_name:'—';},

    const url=c.photo_url||(p&&p.avatar_url)||null;
    const s=size||38;

    $('d-flow-count').textContent=t.sales.length+' órdenes cobradas';
    $('d-flow-cash').textContent=money(t.cash);
    $('d-flow-card').textContent=money(t.card);
    $('d-flow-trans').textContent=money(t.transfer);
    $('chip-cash').textContent=money(t.expected);
    // accesos de hoy
    const bId=this.branch?this.branch.id:null;
    let CI=[];
    try{
      let q=sb.from('checkins').select('*').gte('created_at',todayISO()+'T00:00:00');
      if(bId)q=q.eq('branch_id',bId);
      const {data}=await q;CI=data||[];cset('today_ci',CI);
    }catch(e){CI=cget('today_ci')||[];}
    const inside=CI.filter(c=>c.granted&&!c.checked_out_at);
    $('d-inside').textContent=inside.length;
    // membresías vendidas hoy
    const subsToday=this.subs.filter(s=>s.start_date===todayISO());
    const cells=[['Entradas hoy',CI.filter(c=>c.granted).length,'var(--green)'],['Adentro ahora',inside.length,'var(--orange)'],['Rechazados',CI.filter(c=>!c.granted).length,'var(--red)'],['Membresías hoy',subsToday.length,'var(--ink)']];
    $('d-act-grid').innerHTML=cells.map(([lbl,n,c])=>`
      <div style="background:var(--bg);border-radius:18px;padding:20px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span class="dot" style="background:${c};width:9px;height:9px;border-radius:50%;display:inline-block"></span><span style="font-size:13px;font-weight:600;color:#374151">${lbl}</span></div>
        <div style="font-size:30px;font-weight:700;letter-spacing:-0.035em">${n}</div>
      </div>`).join('');
    // últimas ventas
    if(t.sales.length){
      $('d-last-sales').innerHTML='<table><thead><tr><th>Cliente</th><th>Total</th><th>Pago</th><th>Hora</th></tr></thead><tbody>'+
        t.sales.slice(0,6).map(s=>`<tr><td style="font-weight:700">${esc(this.custName(s.customer_id))}</td><td style="color:#16A34A;font-weight:700">${money(s.total)}</td><td><span class="tag tag-gray">${PAY_LABEL[s.payment_method]||s.payment_method||'—'}</span></td><td>${ftime(s.created_at)}</td></tr>`).join('')+'</tbody></table>';
    }
    // por vencer
    const t7=new Date(Date.now()+7*864e5);
    const expiring=this.customers.map(c=>({c,s:this.bestSub(c)}))
      .filter(x=>x.s&&daysLeft(x.s.end_date)>=0&&new Date(x.s.end_date)<=t7)
      .sort((a,b)=>a.s.end_date<b.s.end_date?-1:1).slice(0,6);
    $('d-expiring').textContent=expiring.length;
    $('d-expiring-list').innerHTML=expiring.length?expiring.map(x=>`
      <div class="row-line"><div><div style="font-weight:700;font-size:14px">${esc(x.c.full_name)}</div><div style="font-size:12px;color:var(--muted);font-weight:500">vence ${fdate(x.s.end_date)}</div></div>
      ${x.c.phone?`<a class="btn btn-xs" style="background:#DCFCE7;color:#16A34A;text-decoration:none" target="_blank" href="${waLink(x.c.phone,'Hola '+x.c.full_name.split(' ')[0]+' 💪 Te recordamos que tu membresía de Volten Gym vence el '+fdate(x.s.end_date)+'. ¡Renueva a tiempo para no perder tu racha!')}">WhatsApp</a>`:''}</div>`).join('')
      :'<div style="color:var(--muted);font-size:13px;font-weight:500;padding:12px 0">Nadie por vencer esta semana.</div>';
    // solicitudes hechas desde la app del cliente
    try{
      const {data:rq}=await sb.from('pos_requests').select('*').eq('status','pendiente').order('created_at',{ascending:false});
      if(rq){this.requests=rq;cset('requests',rq);}
    }catch(e){}
    this.renderRequests();
  },

      const c=this.customers.find(x=>x.id===customerId);
      if(c){this.sale.customer=c;this.sale.step=2;}
    }
    if(planId){
      const p=this.plans.find(x=>x.id===planId);
      if(p)this.sale.cart.push({kind:'plan',id:p.id,name:'Membresía '+p.name,price:Number(p.price),qty:1});
    }
    this.go('sale');

    <div class="sale-grid">

        </div>
        <div class="pick-tabs">
          ${s.quick?'':`<button class="pick-tab ${s.tab==='plans'?'on':''}" onclick="Pos.sale.tab='plans';Pos.go('sale')">Membresías</button>`}

        ${s.tab==='products'?`<div class="search-wrap" style="margin-bottom:14px;max-width:100%"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="inp" placeholder="Buscar producto o escanear código..." value="${esc(s.q||'')}" oninput="Pos.sale.q=this.value;Pos.go('sale')"></div>`:''}
        <div class="prod-grid">${s.tab==='plans'?plansHtml:(s.tab==='coaches'?coachesHtml:prodsHtml)}</div>

  cartPanel(withNext){
    const s=this.sale;const t=this.saleTotals();
    return `
    <div class="panel" style="position:sticky;top:0;">
      <h2 style="font-size:18px">Carrito</h2>
      <div class="psub">${s.cart.length} artículo${s.cart.length===1?'':'s'}</div>
      ${s.cart.length?s.cart.map((it,i)=>`
        <div class="cart-item">
          <div class="cn">${esc(it.name)}<div style="font-size:11px;color:var(--muted);font-weight:600">${money(it.price)} c/u</div></div>
          <div class="cq"><button onclick="Pos.cartQty(${i},-1)">−</button><b>${it.qty}</b><button onclick="Pos.cartQty(${i},1)">＋</button></div>
          <div class="cp">${money(it.price*it.qty)}</div>
        </div>`).join(''):'<div style="color:var(--muted);font-size:13px;font-weight:500;padding:14px 0">Toca un artículo para agregarlo.</div>'}
      <div class="row-line" style="margin-top:8px"><span class="k">Subtotal</span><span class="v">${money(t.subtotal)}</span></div>
      ${t.discount?`<div class="row-line"><span class="k">Descuento (${esc(t.promoName)})</span><span class="v" style="color:#16A34A">−${money(t.discount)}</span></div>`:''}
      <div class="row-line"><span class="k" style="font-weight:800;color:var(--ink)">Total</span><span class="v" style="font-size:22px;color:var(--orange)">${money(t.total)}</span></div>
      ${withNext?`<button class="btn btn-primary btn-block" style="margin-top:14px" ${s.cart.length?'':'disabled'} onclick="Pos.toPay()">Continuar al pago →</button>`:''}
    </div>`;
  },
  addToCart(kind,id,courtesy){
    const s=this.sale;
    if(kind==='plan'){
      if(s.quick||!s.customer){toast('Para vender membresía primero elige al cliente.',true);return;}
      const p=this.plans.find(x=>x.id===id);if(!p)return;
      if(courtesy){
        // Cortesía: solo planes de 1 día, datos completos y máximo 1 vez por persona.
        if(Number(p.duration_days)!==1){toast('La cortesía solo aplica al plan de Día.',true);return;}
        const c=s.customer;
        if(!c.phone||!c.email||!c.gender){toast('Faltan datos del cliente (teléfono/correo/género) para dar la cortesía.',true);return;}
        if(c.courtesy_used_at){toast('Este cliente ya usó su día de cortesía el '+fdate(c.courtesy_used_at)+'.',true);return;}
        s.cart.push({kind:'plan',id,name:'Membresía '+p.name+' (Cortesía)',price:0,qty:1,courtesy:true});
        this.go('sale');return;
      }
      const ex=s.cart.find(x=>x.kind==='plan'&&x.id===id&&!x.courtesy);
      if(ex)ex.qty++;else s.cart.push({kind:'plan',id,name:'Membresía '+p.name,price:Number(p.price),qty:1});
    }else{
      const p=this.products.find(x=>x.id===id);if(!p)return;
      const ex=s.cart.find(x=>x.kind==='product'&&x.id===id);
      const inCart=ex?ex.qty:0;
      if(p.type!=='service'&&this.stockOf(id)-inCart<=0)toast('Ojo: sin stock en esta sucursal (se venderá en negativo).',true);
      if(ex)ex.qty++;else s.cart.push({kind:'product',id,name:p.name,price:Number(p.price),qty:1,service:p.type==='service'});
    }
    this.go('sale');
  },
  addCoachToCart(id){
    const s=this.sale;
    if(s.quick||!s.customer){toast('Para cobrar un coach primero elige al cliente.',true);return;}
    const p=this.appProfiles.find(x=>x.id===id);
    const cp=this.coachProfiles.find(x=>x.profile_id===id);
    const monthly=cp&&cp.monthly_price?Number(cp.monthly_price):0;
    if(!monthly){toast('Este coach no tiene precio mensual definido todavía.',true);return;}
    if(s.cart.find(x=>x.kind==='coach'&&x.id===id)){toast('Ya está en el carrito.',true);return;}
    // El coach es POR TIEMPO (semana o mes) — no es de por vida, se pregunta la duración aquí.
    openModal(`
      <h3>¿Por cuánto tiempo?</h3><p class="msub">Coach — ${esc((p&&p.full_name)||'')}</p>
      <div style="display:flex;gap:10px;margin-top:10px;">
        <button class="btn btn-primary" style="flex:1" onclick="Pos.confirmCoachDuration('${id}','week',${Math.round(monthly/4)})">1 semana<br><span style="font-weight:400;font-size:12px">${money(Math.round(monthly/4))}</span></button>
        <button class="btn btn-primary" style="flex:1" onclick="Pos.confirmCoachDuration('${id}','month',${monthly})">1 mes<br><span style="font-weight:400;font-size:12px">${money(monthly)}</span></button>
      </div>
    `);
  },
  confirmCoachDuration(id,period,price){
    const s=this.sale;
    const p=this.appProfiles.find(x=>x.id===id);
    const days=period==='week'?7:30;
    s.cart.push({kind:'coach',id,name:'Coach — '+((p&&p.full_name)||'')+' ('+(period==='week'?'1 semana':'1 mes')+')',price:Number(price),qty:1,coachDays:days});
    closeModal();this.go('sale');
  },
  async ensureCoachProduct(it,put){
    const sku='coach_'+it.id;
    let p=this.products.find(x=>x.sku===sku);
    if(p)return p.id;
    const payload={id:uuid(),name:it.name,type:'store_item',price:it.price,sku,active:false};
    await put('products',payload);
    this.products.push(payload);cset('products',this.products);
    return payload.id;
  },
  cartQty(i,d){
    const it=this.sale.cart[i];if(!it)return;
    it.qty+=d;if(it.qty<=0)this.sale.cart.splice(i,1);
    this.go('sale');
  },
  toPay(){if(!this.sale.cart.length)return;this.sale.step=3;this.go('sale');},

  saleTotals(){
    const s=this.sale;
    const subtotal=s.cart.reduce((a,x)=>a+x.price*x.qty,0);
    let discount=0,promoName='';
    if(s.promoId){
      const p=this.promos.find(x=>x.id===s.promoId);
      if(p){
        promoName=p.name;
        const elig=s.cart.filter(x=>p.applies_to==='all'||!p.applies_to||(p.applies_to==='plans'&&x.kind==='plan')||(p.applies_to==='products'&&x.kind==='product'))
          .reduce((a,x)=>a+x.price*x.qty,0);
        discount=p.discount_type==='percent'?elig*Number(p.discount_value)/100:Math.min(Number(p.discount_value),elig);
      }
    }
    return{subtotal,discount,total:Math.max(0,subtotal-discount),promoName};
  },

  saleStep3(){
    const s=this.sale;const t=this.saleTotals();
    const promos=this.activePromos();
    const fx=this.shift?Number(this.shift.fx_rate)||0:0;
    const received=Number(s.received)||0;
    const change=received?received-t.total:0;
    // acumulación de días: mostrarla ANTES de cobrar para que no confunda
    let accHtml='';
    const planDays=s.cart.filter(x=>x.kind==='plan').reduce((a,x)=>{const p=this.plans.find(y=>y.id===x.id);return a+(p?Number(p.duration_days)*x.qty:0);},0);
    if(planDays&&s.customer){
      const cur=this.bestSub(s.customer);
      const hasCur=cur&&daysLeft(cur.end_date)>=0;
      const base=hasCur?new Date(cur.end_date+'T12:00:00'):new Date();
      const newEnd=new Date(base.getTime()+planDays*864e5);
      const famPlan=s.cart.some(x=>{if(x.kind!=='plan')return false;const p=this.plans.find(y=>y.id===x.id);return p&&p.is_family;});
      const famN=famPlan&&s.customer.family_id?this.customers.filter(x=>x.family_id===s.customer.family_id).length:0;
      accHtml=`<div style="background:var(--orange-soft);border-radius:14px;padding:14px 16px;margin-bottom:16px;font-size:13.5px;font-weight:600;color:var(--orange-dark);line-height:1.5;">
        ${hasCur?`Este cliente aún tiene vigencia hasta el <b>${fdate(cur.end_date)}</b>. Los días NO se pierden, se suman: comprará <b>${planDays} día${planDays===1?'':'s'}</b> y su nueva vigencia será hasta el <b>${fdate(dISO(newEnd))}</b>.`
        :`Su membresía quedará vigente <b>${planDays} día${planDays===1?'':'s'}</b>: hasta el <b>${fdate(dISO(newEnd))}</b>.`}
        ${famN?`<br>Plan familiar: cubre a los <b>${famN} miembros</b> de su familia con un solo pago.`:''}
      </div>`;
    }
    return `
    <div class="sale-grid">
      <div class="panel">
        <h2>Paso 3 · Cobro</h2>

  payLive(){
    const t=this.saleTotals();const r=Number(this.sale.received)||0;const el=$('pay-change');
    if(!el)return;const ch=r-t.total;
    el.textContent=r?money(ch):'—';el.style.color=ch<0?'var(--red)':'#16A34A';
    const bc=$('btn-cobrar');if(bc)bc.disabled=!(r>0);
  },

  async checkout(){
    if(this._checkingOut)return; this._checkingOut=true;   // candado: un solo cobro aunque piquen doble
    this._acctCreated=null;
    const s=this.sale;const t=this.saleTotals();
    if(!s.method||!s.cart.length){this._checkingOut=false;return;}
    if(s.method==='cash'&&!(Number(s.received)>0)){toast('Captura cuánto recibiste en efectivo antes de cobrar.',true);this._checkingOut=false;return;}
    const bc=$('btn-cobrar');if(bc){bc.disabled=true;bc.textContent='Cobrando...';}
    const c=s.customer;const bId=this.branch?this.branch.id:null;
    const saleId=uuid();const nowIso=new Date().toISOString();
    let qd=false; // si una operación se encola, las que dependen de ella también
    const put=async(table,payload)=>{
      if(qd){Q.push({t:'insert',table,payload});return{queued:true};}
      const r=await Q.insert(table,payload);
      if(r.queued)qd=true;
      return r;
    };
    // 1) venta (con concepto = qué se vendió, para el desglose en reportes)
    const concept=s.cart.map(it=>it.name+(it.qty>1?' x'+it.qty:'')).join(', ');
    const salePayload={id:saleId,branch_id:bId,shift_id:this.shift.id,customer_id:c?c.id:null,
      member_id:(c&&c.profile_id)||null,staff_id:this.user.id,sold_by:this.user.id,
      payment_method:s.method,total:t.total,promo_id:s.promoId||null,concept,created_at:nowIso,
      is_courtesy:s.cart.some(it=>it.courtesy)};
    let r=await this.insertSale(salePayload);
    if(r.error){toast('No se pudo cobrar: '+r.error.message,true);this._checkingOut=false;if(bc){bc.disabled=false;bc.textContent='Cobrar '+money(t.total);}return;}
    if(r.queued)qd=true;
    // 2) partidas + efectos
    for(const it of s.cart){
      let productId=it.id;
      if(it.kind==='plan'){
        const plan=this.plans.find(x=>x.id===it.id);
        productId=await this.ensureMembershipProduct(plan,put);
        const rs=await this.sellMembership(c,plan,it.qty,it.price,s.method,put);
        if(rs&&rs.error){toast('Venta cobrada pero la membresía falló: '+rs.error.message+' — ¿ya corriste pos_migration2.sql?',true);}
        if(it.courtesy&&c){
          // Marca el uso de la cortesía — 1 sola vez por persona.
          try{await Q.update('customers',{id:c.id},{courtesy_used_at:new Date().toISOString()});}catch(e){}
          c.courtesy_used_at=new Date().toISOString();cset('customers',this.customers);
        }
        // Al pagar su membresía, si aún no tiene cuenta de la app, se le crea
        // sola (edge function con la service key — nunca en el navegador).
        if(c&&!c.profile_id&&c.email&&navigator.onLine&&!this._acctCreated){
          try{
            const {data:j,error:fnErr}=await sb.functions.invoke('create-member-account',{
              body:{customer_id:c.id,full_name:c.full_name,email:c.email,branch_id:c.branch_id,coach_id:c.coach_id||null,coach_until:c.coach_until||null},
            });
            if(!fnErr&&j&&j.ok){this._acctCreated={email:j.email,password:j.password};c.profile_id=j.profile_id;cset('customers',this.customers);}
          }catch(e){/* función aún no desplegada u offline — no bloquea la venta */}
        }
      }else if(it.kind==='coach'){
        productId=await this.ensureCoachProduct(it,put);
        // El coach es POR TIEMPO — se le calcula fecha de vencimiento (coach_until)
        // según lo que se cobró (semana/mes); vencido, desaparece de la app del
        // cliente y de "Mis atletas" del coach.
        const days=it.coachDays||30;
        const until=dISO(new Date(Date.now()+days*864e5));
        // AL PAGAR se asigna el coach Y la sucursal al perfil del cliente (si ya tiene app)
        // → en su teléfono aparece el mismo entrenador y su sucursal.
        if(c&&c.profile_id){
          const mp={profile_id:c.profile_id,coach_id:it.id,coach_until:until};
          if(c.branch_id)mp.branch_id=c.branch_id;
          try{await sb.from('member_profiles').upsert(mp,{onConflict:'profile_id'});}catch(e){}
        }
        // guarda el coach en la ficha para que se transfiera si vincula la app después
        try{await Q.update('customers',{id:c.id},{coach_id:it.id,coach_until:until});}catch(e){}
        c.coach_id=it.id;c.coach_until=until;cset('customers',this.customers);
      }
      await put('sale_items',{id:uuid(),sale_id:saleId,product_id:productId,quantity:it.qty,unit_price:it.price});
      if(it.kind==='product'&&!it.service){
        if(qd)Q.push({t:'stock',branch_id:bId,product_id:it.id,delta:-it.qty,reason:'venta',staff_id:this.user.id,moveId:uuid()});
        else await Q.stockDelta(bId,it.id,-it.qty,'venta',this.user.id);
        const st=this.stock.find(x=>x.product_id===it.id&&x.branch_id===bId);
        if(st)st.qty=Number(st.qty)-it.qty;else this.stock.push({branch_id:bId,product_id:it.id,qty:-it.qty,min_qty:0});
        cset('stock',this.stock);
      }
    }
    // 3) datos para el ticket
    const bs=c?this.bestSub(c):null;
    this.lastSale={folio:saleId.slice(0,8).toUpperCase(),date:new Date().toLocaleString('es-MX',{day:'numeric',month:'short',year:'numeric',hour:'numeric',minute:'2-digit'}),
      branch:this.branch?this.branch.name:'',items:s.cart.map(x=>({name:x.name,qty:x.qty,price:x.price})),
      discount:t.discount,total:t.total,method:s.method,received:Number(s.received)||0,
      customer:c?c.full_name:'',staff:this.profileName,
      membershipEnd:(bs&&s.cart.some(x=>x.kind==='plan'))?fdate(bs.end_date):null};
    // 4) si venía de una solicitud de la app, marcarla como cobrada
    if(this._reqId){
      Q.update('pos_requests',{id:this._reqId},{status:'cobrada'});
      this.requests=this.requests.filter(x=>x.id!==this._reqId);cset('requests',this.requests);
      this._reqId=null;
    }
    // 5) actualizar cache de ventas del turno
    const sc=cget('shift_sales')||[];sc.unshift(salePayload);cset('shift_sales',sc);
    s.queued=qd;s.step=4;this._checkingOut=false;this.go('sale');this.refreshChip();
    Q.badge();
  },

  async insertSale(payload){
    if(navigator.onLine){
      try{
        let {error}=await sb.from('sales').insert(payload);
        // si falta la columna concept/is_courtesy (migraciones 6/7 no corridas), reintenta sin ellas
        if(error&&/concept|is_courtesy/i.test(error.message||'')){
          const p2=Object.assign({},payload);delete p2.concept;delete p2.is_courtesy;
          const r=await sb.from('sales').insert(p2);error=r.error;
        }
        if(error&&/register_id/i.test(error.message||'')){
          const regId=await this.legacyRegister();
          if(regId){const p3=Object.assign({},payload,{register_id:regId});if(/concept/i.test(error.message||''))delete p3.concept;const r2=await sb.from('sales').insert(p3);error=r2.error;}
        }
        if(!error)return{ok:true};
        if(!isNetErr(error))return{error};
      }catch(e){if(!isNetErr(e))return{error:e};}
    }
    Q.push({t:'insert',table:'sales',payload});
    return{queued:true};
  },
  async legacyRegister(){
    const k='legacyreg_'+this.shift.id;const c=cget(k);if(c)return c;
    const {data,error}=await sb.from('cash_registers').insert({opened_by:this.user.id,opening_amount:this.shift.opening_cash||0,notes:'auto-POS'}).select().single();
    if(error||!data)return null;
    cset(k,data.id);return data.id;
  },
  async ensureMembershipProduct(plan,put){
    let p=this.products.find(x=>x.plan_id===plan.id);
    if(p)return p.id;
    const payload={id:uuid(),name:'Membresía '+plan.name,type:'membership',price:Number(plan.price),plan_id:plan.id,active:true};
    await put('products',payload);
    this.products.push(payload);cset('products',this.products);
    return payload.id;
  },
  async sellMembership(customer,plan,qty,priceEach,method,put){
    if(!customer)return{error:{message:'sin cliente'}};
    // Plan FAMILIAR: la vigencia se aplica a TODOS los miembros de la familia, paga solo este cliente
    let targets=[customer];
    if(plan.is_family&&customer.family_id){
      const fam=this.customers.filter(x=>x.family_id===customer.family_id);
      if(fam.length)targets=fam;
      if(plan.max_members&&fam.length>Number(plan.max_members))
        toast('Ojo: la familia tiene '+fam.length+' miembros y este plan cubre máximo '+plan.max_members+'.',true);
    }
    let firstErr=null;
    for(const m of targets){
      const cur=this.bestSub(m);
      let base=new Date();
      if(cur&&daysLeft(cur.end_date)>=0)base=new Date(cur.end_date+'T12:00:00'); // acumula: arranca donde termina la actual
      const end=new Date(base.getTime()+Number(plan.duration_days)*qty*864e5);
      const sub={id:uuid(),member_id:m.profile_id||null,customer_id:m.id,plan_id:plan.id,
        status:'active',start_date:todayISO(),end_date:dISO(end),
        branch_id:this.branch?this.branch.id:null,sold_by:this.user.id,shift_id:this.shift.id,
        price_paid:m.id===customer.id?priceEach*qty:0,payment_method:method,family_id:m.family_id||null};
      const r=await put('subscriptions',sub);
      if(r.error){firstErr=r;continue;}
      this.subs.unshift(sub);
      if(m.id===customer.id)await put('payments',{id:uuid(),subscription_id:sub.id,amount:priceEach*qty,method:method,recorded_by:this.user.id});
    }
    cset('subs',this.subs);
    return firstErr||{ok:true};
  },

        <input class="inp" id="nc-app-q" placeholder="Nº de cuenta que ve en su app (Perfil → Mi código QR)" oninput="Pos.ncSearchApp(this.value)">

  ncSearchApp(q){
    q=(q||'').toLowerCase().trim();
    if(q.startsWith(QR_PREFIX))q=q.slice(QR_PREFIX.length); // QR escaneado de la app
    const box=$('nc-app-res');
    if(!q){box.innerHTML='Si no tiene app, déjalo vacío.';this._newCustLink=null;return;}
    if(q.length<4){box.innerHTML='Escribe el Nº de cuenta completo (8 caracteres).';this._newCustLink=null;return;}
    const linked=new Set(this.customers.map(c=>c.profile_id).filter(Boolean));
    const p=this.appProfiles.find(x=>x.role==='member'&&!linked.has(x.id)&&(x.id===q||x.id.startsWith(q)));
    if(p){
      this._newCustLink=p.id;
      if(!$('nc-name').value)$('nc-name').value=p.full_name||'';
      if(!$('nc-email').value&&p.email)$('nc-email').value=p.email||'';
      box.innerHTML='<span style="color:#16A34A;font-weight:700">Cuenta encontrada: '+esc(p.full_name||p.email)+' ✓ (quedará vinculada)</span>';
    }else{
      this._newCustLink=null;
      box.innerHTML='<span style="color:var(--muted)">Sin coincidencia con ese número (o ya está vinculada). Puedes dejarlo vacío.</span>';
    }
  },
  async saveNewCustomer(fromSale){
    const name=$('nc-name').value.trim();
    const phone=$('nc-phone').value.trim();
    const email=$('nc-email').value.trim();
    const gender=$('nc-gender')?$('nc-gender').value:'';
    // Campos obligatorios (pedido explícito del dueño): nombre completo (3+
    // palabras = nombre y 2 apellidos), teléfono, correo y género.
    if(name.split(/\s+/).filter(Boolean).length<3){toast('Escribe nombre y los dos apellidos completos.',true);return;}
    if(!phone){toast('El teléfono es obligatorio.',true);return;}
    if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('Escribe un correo válido, es obligatorio.',true);return;}
    if(!gender){toast('Selecciona el género, es obligatorio.',true);return;}
    const famSel=$('nc-family')?$('nc-family').value||null:null;
    const payload={id:uuid(),full_name:name,phone,email,gender,
      birth_date:($('nc-birth')&&$('nc-birth').value)||null,address:($('nc-address')&&$('nc-address').value.trim())||null,
      notes:$('nc-notes').value.trim()||null,profile_id:this._newCustLink||null,family_id:famSel,
      branch_id:this.branch?this.branch.id:null,suspended:false,created_at:new Date().toISOString()};
    let r=await Q.insert('customers',payload);
    if(r.error&&/gender|birth_date|address/i.test(r.error.message||'')){
      // Falta correr pos_migration7.sql — reintenta sin esas columnas para no bloquear la venta.
      const p2={...payload};delete p2.gender;delete p2.birth_date;delete p2.address;
      r=await Q.insert('customers',p2);
    }
    if(r.error){toast('Error: '+r.error.message,true);return;}
    this.customers.unshift(payload);cset('customers',this.customers);
    closeModal();toast(r.queued?'Cliente guardado local — sincroniza al volver internet':'Cliente creado ✓');
    if(fromSale){this.sale.customer=payload;this.sale.quick=false;this.sale.step=2;this.go('sale');}
    else if(this.nav==='customers')this.renderCustTable();
  },

  changeBranchModal(custId){
    const c=this.customers.find(x=>x.id===custId);if(!c)return;
    const cur=this.branches.find(b=>b.id===c.branch_id);
    openModal(`
      <h3>Cambiar de sucursal</h3><p class="msub">${esc(c.full_name)} — actualmente en ${esc(cur?cur.name:'sin sucursal')}</p>
      <div style="background:#FEF3C7;color:#92400E;border-radius:12px;padding:12px 14px;font-size:13px;font-weight:600;margin-bottom:14px;">
        Al cambiarlo, su membresía y coach actuales quedan sin efecto en la sucursal nueva (los pagó en la sucursal anterior). Tendrá que comprar su membresía otra vez ahí.
      </div>
      <div class="field"><label>Nueva sucursal</label>
        <select class="inp" id="cb-branch">${this.branches.filter(b=>b.id!==c.branch_id).map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('')}</select>

  async doChangeBranch(custId){
    const c=this.customers.find(x=>x.id===custId);if(!c)return;
    const newBranch=$('cb-branch').value;
    // Deja al cliente EN CERO en la sucursal nueva: sin coach activo (su
    // membresía histórica queda intacta pero ya no valida acceso porque el
    // check de entrada es por sucursal — bestSubForBranch la ignora sola).
    const r=await Q.update('customers',{id:custId},{branch_id:newBranch,coach_id:null,coach_until:null});
    if(r.error){toast('Error: '+r.error.message,true);return;}
    c.branch_id=newBranch;c.coach_id=null;c.coach_until=null;cset('customers',this.customers);
    if(c.profile_id){try{await sb.from('member_profiles').update({branch_id:newBranch,coach_id:null,coach_until:null}).eq('profile_id',c.profile_id);}catch(e){}}
    closeModal();toast('Sucursal actualizada ✓ — puede comprar su membresía aquí');this.go('customers');
  },
  linkSearch(custId,q,enter){
    q=(q||'').trim();
    if(q.toLowerCase().startsWith(QR_PREFIX))q=q.slice(QR_PREFIX.length); // QR de la app
    const box=$('link-res');
    if(q.length<3){box.innerHTML='Escribe al menos 3 letras, el número de cuenta, o escanea el QR.';return;}
    const ql=q.toLowerCase();
    const linked=new Set(this.customers.map(c=>c.profile_id).filter(Boolean));
    const res=this.appProfiles.filter(p=>p.role==='member'&&!linked.has(p.id)&&(p.id===ql||p.id.startsWith(ql)||(p.full_name||'').toLowerCase().includes(ql)||(p.email||'').toLowerCase().includes(ql))).slice(0,5);
    // QR escaneado o número de cuenta exacto → vincular directo
    if(enter&&res.length===1){this.linkApp(custId,res[0].id);return;}
    box.innerHTML=res.length?res.map(p=>`
      <button class="cust-row" onclick="Pos.linkApp('${custId}','${p.id}')">
        <div class="av2">${esc((p.full_name||p.email||'?')[0].toUpperCase())}</div>
        <div class="cd"><b>${esc(p.full_name||'(sin nombre)')}</b><span>${esc(p.email||'')}</span></div>
        <span class="tag tag-orange">Vincular</span>
      </button>`).join(''):'Sin coincidencias. Verifica el correo, el número de cuenta o el QR.';
  },
  async linkApp(custId,profileId){
    const c=this.customers.find(x=>x.id===custId);if(!c)return;
    const r=await Q.update('customers',{id:custId},{profile_id:profileId});
    if(r.error){toast('Error: '+r.error.message,true);return;}
    c.profile_id=profileId;cset('customers',this.customers);
    // pasar sus membresías de ficha a la cuenta app (para que las vea en su teléfono)
    try{await sb.from('subscriptions').update({member_id:profileId}).eq('customer_id',custId).is('member_id',null);}catch(e){}
    this.subs.forEach(s=>{if(s.customer_id===custId&&!s.member_id)s.member_id=profileId;});cset('subs',this.subs);
    toast('Cuenta de la app vinculada ✓ — su membresía ya aparece en su teléfono');
    this.openCustomer(custId);
  },
  async unlinkApp(custId){
    const c=this.customers.find(x=>x.id===custId);if(!c)return;
    const r=await Q.update('customers',{id:custId},{profile_id:null});
    if(r.error){toast('Error: '+r.error.message,true);return;}
    c.profile_id=null;cset('customers',this.customers);
    toast('Cuenta desvinculada');this.openCustomer(custId);
  },

  createFamily(custId){

  async saveFamily(custId){

  async famAddMember(famId,fromCustId){
    const id=$('fam-member').value;if(!id)return;
    const r=await Q.update('customers',{id},{family_id:famId});

  async buildCampaign(){
    const aud=$('cp-aud').value,msg=$('cp-msg').value;
    const box=$('cp-list');box.innerHTML='Preparando...';
    const withSub=this.customers.map(c=>({c,s:this.bestSub(c)}));
    let list=[];
    if(aud==='porvencer')list=withSub.filter(x=>x.s&&daysLeft(x.s.end_date)>=0&&daysLeft(x.s.end_date)<=7);
    else if(aud==='vencidos')list=withSub.filter(x=>x.s&&daysLeft(x.s.end_date)<0&&daysLeft(x.s.end_date)>=-30);
    else if(aud==='activos')list=withSub.filter(x=>x.s&&daysLeft(x.s.end_date)>=0);
    else if(aud==='todos')list=withSub;
    else{
      try{
        const since=new Date(Date.now()-14*864e5).toISOString();
        const {data}=await sb.from('checkins').select('customer_id,member_id').gte('created_at',since).eq('granted',true);
        const seen=new Set();(data||[]).forEach(x=>{if(x.customer_id)seen.add(x.customer_id);if(x.member_id)seen.add(x.member_id);});
        list=withSub.filter(x=>x.s&&daysLeft(x.s.end_date)>=0&&!seen.has(x.c.id)&&!(x.c.profile_id&&seen.has(x.c.profile_id)));
      }catch(e){box.innerHTML='Sin conexión — este grupo necesita internet.';return;}
    }
    list=list.filter(x=>x.c.phone);
    if(!list.length){box.innerHTML='<div style="color:var(--muted);font-size:13px;font-weight:500">No hay clientes con teléfono en ese grupo.</div>';return;}
    box.innerHTML='<div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px">'+list.length+' cliente(s). Pica cada botón: se abre WhatsApp con el mensaje listo, tú solo le das enviar.</div>'
      +list.map((x,i)=>{
        const text=msg.replace(/\{nombre\}/g,(x.c.full_name||'').split(' ')[0]).replace(/\{fecha\}/g,x.s?fdate(x.s.end_date):'');
        return `<div class="row-line"><div style="font-weight:700">${i+1}. ${esc(x.c.full_name)}<div style="font-size:12px;color:var(--muted);font-weight:500">${x.s?('vigencia: '+fdate(x.s.end_date)):'sin membresía'}</div></div>

      }).join('');
  },

  accFrom:todayISO(), accTo:todayISO(), accHist:[], accInside:[],

  async after_access(){const i=$('scan-inp');if(i)i.focus();await this.loadAccess();},
  accPreset(days){
    const to=new Date();const from=new Date(Date.now()-(days-1)*864e5);
    this.accFrom=dISO(from);this.accTo=dISO(to);
    const f=$('acc-from'),t=$('acc-to');if(f)f.value=this.accFrom;if(t)t.value=this.accTo;
    this.loadAccess();
  },
  async loadAccess(){
    const bId=this.branch?this.branch.id:null;
    try{
      let q=sb.from('checkins').select('*').gte('created_at',this.accFrom+'T00:00:00').lte('created_at',this.accTo+'T23:59:59').order('created_at',{ascending:false}).limit(2000);
      if(bId)q=q.eq('branch_id',bId);
      const {data}=await q;this.accHist=data||[];cset('acc_hist',this.accHist);
    }catch(e){this.accHist=cget('acc_hist')||[];}
    try{
      let q2=sb.from('checkins').select('*').gte('created_at',todayISO()+'T00:00:00').eq('granted',true).is('checked_out_at',null).order('created_at',{ascending:false});
      if(bId)q2=q2.eq('branch_id',bId);
      const {data:d2}=await q2;
      // Sin lector de salida (el torniquete deja salir libre, sin escanear),
      // el sistema NO sabe la hora exacta en que alguien se fue. Para que
      // "adentro ahora" no acumule gente que ya se fue hace rato:
      // - Personal (coach/encargados) con horario configurado: se asume que
      //   ya salió en cuanto pasa su hora de salida programada.
      // - Todos los demás (miembros, o personal sin horario puesto): estimado
      //   de 3 horas sin actividad. Nunca se escribe una hora de salida falsa,
      //   solo se oculta de esta lista en vivo (el corte del día sí la cierra).
      const STALE_MS=3*60*60*1000;
      const now=new Date();
      this.accInside=(d2||[]).filter(ci=>{
        const staff=!ci.customer_id&&ci.member_id?this.appProfiles.find(p=>p.id===ci.member_id):null;
        if(staff&&staff.shift_end){
          const [hh,mm]=staff.shift_end.split(':').map(Number);
          const shiftEnd=new Date(ci.created_at);shiftEnd.setHours(hh,mm||0,0,0);
          return now<shiftEnd;
        }
        return (now.getTime()-new Date(ci.created_at).getTime())<STALE_MS;
      });
    }catch(e){this.accInside=[];}
    this.renderAccess();

  accessScan(code){
    code=(code||'').trim();
    if(code.toLowerCase().startsWith(QR_PREFIX))code=code.slice(QR_PREFIX.length); // QR de la app: volten-gym:member:<id>
    if(!code)return;
    $('scan-inp').value='';
    // número de cuenta corto (8+ caracteres del inicio del ID)
    if(/^[0-9a-f]{8,32}$/i.test(code)&&code.length<32){
      const ql=code.toLowerCase();
      const hit=this.customers.find(c=>(c.profile_id&&c.profile_id.startsWith(ql))||c.id.startsWith(ql))
        ||null;
      if(hit){this.doCheckin(hit.id,'qr');return;}
      const p=this.appProfiles.find(x=>x.id.startsWith(ql)&&x.role==='member');
      if(p){this.autoImportProfile(p);return;}
      this.showAccessResult(false,'Cliente no encontrado','Número de cuenta sin coincidencias',null);return;
    }
    const isUuid=/^[0-9a-f-]{32,36}$/i.test(code);
    let cust=null;
    if(isUuid){
      cust=this.customers.find(c=>c.id===code||c.profile_id===code)||null;
      if(!cust){
        const p=this.appProfiles.find(x=>x.id===code);
        if(p){this.autoImportProfile(p);return;}
      }
    }else{
      const q=code.toLowerCase();
      const matches=this.customers.filter(c=>(c.full_name||'').toLowerCase().includes(q)||(c.phone||'').includes(q));
      if(matches.length===1)cust=matches[0];
      else if(matches.length>1){
        $('scan-picker').innerHTML='<div class="panel">'+matches.slice(0,5).map(c=>`
          <button class="cust-row" onclick="Pos.doCheckin('${c.id}','manual');$('scan-picker').innerHTML=''">
            <div class="av2">${esc((c.full_name||'?')[0].toUpperCase())}</div>
            <div class="cd"><b>${esc(c.full_name)}</b><span>${esc(c.phone||'')}</span></div>
            ${this.membershipTag(c)}
          </button>`).join('')+'</div>';
        return;
      }
    }
    if(!cust){
      // ¿es personal (cajera/coach/encargado/admin/limpieza)? el staff siempre entra
      const q=code.toLowerCase();
      const staff=this.appProfiles.find(x=>x.role&&x.role!=='member'&&(x.full_name||'').toLowerCase().includes(q));
      if(staff){this.doStaffCheckin(staff);return;}
      this.showAccessResult(false,'No encontrado','Verifica el QR/nombre o regístralo en Clientes',null);return;
    }
    this.doCheckin(cust.id,isUuid?'qr':'manual');
  },
  async doStaffCheckin(staff){
    const now=new Date().toISOString();
    // busca si ya está adentro (para marcar salida con el 2º escaneo)
    const open=this.accInside.find(x=>x.member_id===staff.id);
    if(open){await this.checkOut(open.id);this.showAccessResult(true,'SALIDA REGISTRADA','Hasta luego',staff.full_name);const i=$('scan-inp');if(i)i.focus();return;}
    const payload={id:uuid(),member_id:staff.id,customer_id:null,branch_id:this.branch?this.branch.id:null,
      method:'manual',verified_by:this.user.id,granted:true,created_at:now,checked_in_at:now};

    if(!r.error){this.accInside.unshift(payload);this.accHist.unshift(payload);}
    this.showAccessResult(true,'ACCESO PERMITIDO',(ROLE_LABEL[staff.role]||'Personal')+' · acceso de trabajo',staff.full_name);
