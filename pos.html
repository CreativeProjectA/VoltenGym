  async doCheckin(custId,method){
    const c=this.customers.find(x=>x.id===custId);if(!c)return;
    // si YA está adentro, el mismo escaneo (QR/huella) registra su SALIDA
    const open=this.accInside.find(x=>x.customer_id===c.id||(c.profile_id&&x.member_id===c.profile_id));
    if(open){
      await this.checkOut(open.id);
      this.showAccessResult(true,'SALIDA REGISTRADA','Hasta luego, que descanses',c.full_name);
      const i=$('scan-inp');if(i)i.focus();
      return;
    }
    let granted=true,why='';
    const bId=this.branch?this.branch.id:null;
    const s=this.bestSubForBranch(c,bId);
    const other=!s?this.bestSubOtherBranch(c,bId):null;
    if(c.suspended){granted=false;why='Acceso suspendido por administración';}
    else if(other){granted=false;why='Su membresía es de '+(this.branches.find(b=>b.id===other.branch_id)||{}).name+' — no válida aquí. Puede cambiar de sucursal en su ficha.';}
    else if(!s){granted=false;why='Sin membresía en esta sucursal — véndele una en Nueva venta';}
    else if(daysLeft(s.end_date)<0){granted=false;why='Membresía vencida el '+fdate(s.end_date);}
    else why='Membresía al corriente · le quedan '+daysLeft(s.end_date)+' día'+(daysLeft(s.end_date)===1?'':'s')+' ('+fdate(s.end_date)+')';
    const now=new Date().toISOString();
    const payload={id:uuid(),member_id:c.profile_id||null,customer_id:c.id,branch_id:this.branch?this.branch.id:null,
      method,verified_by:this.user.id,granted,created_at:now,checked_in_at:now};
    let r=await Q.insert('checkins',payload);
    if(r.error&&/method/i.test(r.error.message||'')){payload.method='qr';r=await Q.insert('checkins',payload);}
    if(r.error&&/member_id/i.test(r.error.message||'')){toast('Falta correr pos_migration2.sql en Supabase para clientes sin app.',true);}
    else if(r.error){toast('Error al registrar: '+r.error.message,true);}
    this.showAccessResult(granted,granted?'ACCESO PERMITIDO':'ACCESO DENEGADO',why,c.full_name);
    if(granted&&!r.error){this.accInside.unshift(payload);this.accHist.unshift(payload);}
    else if(!r.error)this.accHist.unshift(payload);
    this.renderAccess();
    const i=$('scan-inp');if(i)i.focus();
  },
  showAccessResult(ok,big,why,name){
    const el=$('access-result');if(!el)return;
    el.className=ok?'ok':'deny';el.style.display='block';
    el.innerHTML='<div class="big">'+(ok?'✓ ':'✕ ')+esc(big)+'</div>'+(name?'<div class="who2">'+esc(name)+'</div>':'')+'<div class="why">'+esc(why)+'</div>';
    clearTimeout(this._art);this._art=setTimeout(()=>{el.style.display='none';},6000);
  },
  async checkOut(id){
    const r=await Q.update('checkins',{id},{checked_out_at:new Date().toISOString()});
    if(r.error){toast('Error: '+r.error.message,true);return;}
    this.accInside=this.accInside.filter(x=>x.id!==id);
    const h=this.accHist.find(x=>x.id===id);if(h)h.checked_out_at=new Date().toISOString();
    this.renderAccess();toast('Salida registrada ✓');
  },

  async after_inventory(){

      const {data}=await sb.from('products').select('*').order('name');

      const {data:st}=await sb.from('stock').select('*');

      let q=sb.from('stock_moves').select('*').order('created_at',{ascending:false}).limit(15);

    }catch(e){}
    const el=$('inv-moves');

    const type=($('pr-type')&&$('pr-type').value)||'store_item';
    const isSrv=type==='service';
    const base={name,type,price:Number($('pr-price').value)||0,cost:Number($('pr-cost').value)||0,
      category:$('pr-cat').value.trim()||null,sku:isSrv?null:(($('pr-sku')&&$('pr-sku').value.trim())||null),active:$('pr-active').value==='si'};

    const minQty=isSrv?0:(Number($('pr-min')&&$('pr-min').value)||0);

      if(r.error){toast('Error: '+r.error.message,true);return;}
      Object.assign(this.products.find(x=>x.id===id)||{},base);
    }else{

      if(r.error){toast('Error: '+r.error.message,true);return;}

    if(!isSrv){

        const cur=this.stock.find(x=>x.product_id===id&&x.branch_id===bId);
        await sb.from('stock').upsert({branch_id:bId,product_id:id,qty:cur?cur.qty:0,min_qty:minQty});
        if(cur)cur.min_qty=minQty;else this.stock.push({branch_id:bId,product_id:id,qty:0,min_qty:minQty});
      }catch(e){}
    }

  /* ═══════ REPORTES ═══════ */
  setChartMode(mode){
    // Instantáneo: repinta con los datos ya cargados, sin volver a pedir a la red.
    this.repChart=mode;
    const bb=$('ct-bars'),bd=$('ct-donut');
    if(bb)bb.className=mode==='bars'?'on':'';
    if(bd)bd.className=mode==='donut'?'on':'';
    this.paintMiniCharts();
  },
  // Un color de vida distinto por métrica (no todo naranja) — barras Y dona lo usan.
  MINI_COLORS:{total:'#3B82F6',count:'#8B5CF6',subs:'#22C55E',visits:'#F97316',avg:'#06B6D4',movin:'#22C55E',movout:'#EF4444',net:'#111111'},
  paintMiniCharts(){
    if(!this._miniData)return;
    Object.keys(this._miniData).forEach(k=>this.paintMini('mc-'+k,this._miniData[k],this.MINI_COLORS[k]||'#3B82F6'));
  },
  paintMini(id,vals,color){
    const el=$(id);if(!el)return;
    const mode=this.repChart||'bars';
    if(!vals.some(v=>v>0)){el.innerHTML='<div style="font-size:11px;color:#D1D5DB;font-weight:600;padding-top:16px">sin movimiento</div>';return;}
    if(mode==='bars'){
      const mx2=Math.max(...vals);const bw=100/vals.length;
      el.innerHTML='<svg viewBox="0 0 100 46" preserveAspectRatio="none">'+vals.map((v,i)=>{
        const h=v>0?Math.max(3,v/mx2*40):1.5;
        return '<rect x="'+(i*bw+bw*0.15).toFixed(1)+'" y="'+(44-h).toFixed(1)+'" width="'+(bw*0.7).toFixed(1)+'" height="'+h.toFixed(1)+'" rx="1.5" fill="'+(v>0?color:'#EFEFEF')+'"/>';
      }).join('')+'</svg>';
    }else{
      // círculo: dona con el reparto del período en 4 tramos, en tonos de la métrica
      const q=4,qs=Array(q).fill(0),per=Math.ceil(vals.length/q);
      vals.forEach((v,i)=>{qs[Math.min(q-1,Math.floor(i/per))]+=v;});
      const tot2=qs.reduce((a,b)=>a+b,0)||1;
      const shades=this.shadesOf(color);
      let off=0;
      el.innerHTML='<svg viewBox="0 0 46 46"><g transform="rotate(-90 23 23)">'+qs.map((v,i)=>{
        const frac=v/tot2,C=2*Math.PI*17;
        const seg='<circle cx="23" cy="23" r="17" fill="none" stroke="'+shades[i]+'" stroke-width="7" stroke-dasharray="'+(frac*C).toFixed(1)+' '+C.toFixed(1)+'" stroke-dashoffset="'+(-off*C).toFixed(1)+'"/>';
        off+=frac;return frac>0?seg:'';
      }).join('')+'</g></svg>';
    }
  },
  // 4 tonos del mismo color (más claro a más oscuro) para que la dona se lea con vida sin ser arcoíris
  shadesOf(hex){
    const n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255;
    const mix=(t)=>{const rr=Math.round(r+(255-r)*t),gg=Math.round(g+(255-g)*t),bb2=Math.round(b+(255-b)*t);return '#'+[rr,gg,bb2].map(x=>x.toString(16).padStart(2,'0')).join('');};
    return [hex,mix(0.3),mix(0.55),mix(0.8)];
  },
  view_reports(){
    return `
    <div class="topbar">
      <div><h1>Reportes</h1><div class="sub">Rendimiento del negocio</div></div>
      <div style="display:flex;gap:12px;align-items:center;">

    <div class="cards">
      <div class="card"><div class="lbl">Ventas brutas <span class="tag tag-green" id="r-trend" style="display:none"></span></div><div class="val" id="r-total">—</div><div class="foot" id="r-total-f"></div><div class="mini-ch" id="mc-total"></div></div>
      <div class="card"><div class="lbl">Órdenes</div><div class="val" id="r-count">—</div><div class="foot">cobradas en el período</div><div class="mini-ch" id="mc-count"></div></div>
      <div class="card"><div class="lbl">Membresías vendidas</div><div class="val" id="r-subs">—</div><div class="foot">nuevas + renovaciones</div><div class="mini-ch" id="mc-subs"></div></div>
      <div class="card"><div class="lbl">Visitas</div><div class="val" id="r-visits">—</div><div class="foot">accesos permitidos</div><div class="mini-ch" id="mc-visits"></div></div>
    </div>
    <div class="cards">
      <div class="card"><div class="lbl">Ticket promedio</div><div class="val" id="r-avg">—</div><div class="foot">por orden cobrada</div><div class="mini-ch" id="mc-avg"></div></div>
      <div class="card"><div class="lbl">Efectivo metido</div><div class="val" id="r-movin">—</div><div class="foot">entradas manuales a caja</div><div class="mini-ch" id="mc-movin"></div></div>
      <div class="card"><div class="lbl">Retiros / egresos</div><div class="val" id="r-movout">—</div><div class="foot">efectivo que salió de caja</div><div class="mini-ch" id="mc-movout"></div></div>
      <div class="card"><div class="lbl">Utilidad neta</div><div class="val" id="r-net">—</div><div class="foot">ventas menos egresos</div><div class="mini-ch" id="mc-net"></div></div>
    </div>
    <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:16px;align-items:start;">
      <div class="panel"><h2>Ingresos por día</h2><div class="psub" id="r-range-lbl"></div><div id="r-bars"></div></div>
      <div class="panel"><h2>Métodos de pago</h2><div class="psub">Distribución por tipo</div><div id="r-donut"></div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;">
      <div class="panel"><h2>Asistencia por hora</h2><div class="psub">Para conocer tus horas pico</div><div id="r-hours"></div></div>
      <div class="panel"><h2>Hombres vs Mujeres</h2><div class="psub">Clientes registrados con acceso en el período</div><div id="r-gender"></div></div>
    </div>
    <div class="panel"><h2>Ventas por empleado</h2><div class="psub">Órdenes y membresías del período</div><div id="r-staff"></div></div>
    <div class="panel">
      <div><h2>Reporte por empleado</h2><div class="psub">Elige quién y el período — verás todo lo que vendió: órdenes, membresías y totales</div></div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;">
        <select class="inp" style="max-width:230px;height:44px" id="emp-sel">
          <option value="">Elegir empleado...</option>
          ${this.appProfiles.filter(p=>['admin','encargado','cajera'].includes(p.role)).map(p=>`<option value="${p.id}">${esc(p.full_name||p.email)}</option>`).join('')}
        </select>
        <input class="inp" type="date" style="height:44px;width:160px" id="emp-from" value="${dISO(new Date(Date.now()-29*864e5))}">
        <span style="color:var(--muted);font-weight:700">→</span>
        <input class="inp" type="date" style="height:44px;width:160px" id="emp-to" value="${todayISO()}">
        <button class="btn btn-sm btn-primary" onclick="Pos.runEmpReport()">Ver reporte</button>
        <button class="btn btn-sm btn-ghost" onclick="Pos.exportEmpCSV()">Exportar</button>
      </div>
      <div id="emp-report" style="color:var(--muted);font-size:14px;font-weight:500;">Elige un empleado y el rango de fechas (día, semana, mes o el período que quieras).</div>
    </div>
    <div class="panel">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;"><div><h2>Historial de turnos</h2><div class="psub" style="margin-bottom:0">Cortes de caja con diferencias</div></div>
      <div style="display:flex;gap:8px;"><button class="btn btn-sm btn-ghost" onclick="Pos.exportSalesCSV()">Exportar ventas</button><button class="btn btn-sm btn-ghost" onclick="Pos.exportShiftsCSV()">Exportar turnos</button></div></div>
      <div id="r-shifts" style="margin-top:14px">Cargando...</div>
    </div>`;
  },
  _repSales:[],_repShifts:[],
  async after_reports(){
    const days=this.reportRange==='today'?1:(this.reportRange==='7d'?7:30);
    const from=new Date();from.setHours(0,0,0,0);from.setDate(from.getDate()-(days-1));
    const bId=this.branch?this.branch.id:null;
    let S=[],CI=[],SH=[];
    try{
      let q=sb.from('sales').select('*').gte('created_at',from.toISOString()).order('created_at');
      if(bId)q=q.eq('branch_id',bId);
      const {data}=await q;S=data||[];
    }catch(e){}
    try{
      let q=sb.from('checkins').select('created_at,granted').gte('created_at',from.toISOString()).eq('granted',true);
      if(bId)q=q.eq('branch_id',bId);
      const {data}=await q;CI=data||[];
    }catch(e){}
    try{
      let q=sb.from('cash_shifts').select('*').order('opened_at',{ascending:false}).limit(15);
      if(bId)q=q.eq('branch_id',bId);
      const {data}=await q;SH=data||[];
    }catch(e){}
    let MV=[];
    try{
      const {data}=await sb.from('cash_movements').select('type,amount,created_at').gte('created_at',from.toISOString());
      MV=data||[];
    }catch(e){}
    this._repSales=S;this._repShifts=SH;
    // ── Series diarias por métrica → mini-gráfica en cada tarjeta ──
    const nB=days===1?12:Math.min(days,31);
    const mkSeries=()=>Array(nB).fill(0);
    const bIdx=(iso)=>{const d=new Date(iso);return days===1?Math.min(11,Math.floor(d.getHours()/2)):Math.max(0,Math.min(nB-1,Math.floor((d-from)/((days*864e5)/nB))));};
    const sTot=mkSeries(),sCnt=mkSeries(),sVis=mkSeries(),sIn=mkSeries(),sOut=mkSeries(),sSub=mkSeries();
    S.forEach(x=>{const i=bIdx(x.created_at);sTot[i]+=Number(x.total||0);sCnt[i]++;});
    CI.forEach(x=>{sVis[bIdx(x.created_at)]++;});
    MV.forEach(x=>{const i=bIdx(x.created_at);if(x.type==='in')sIn[i]+=Number(x.amount||0);else sOut[i]+=Number(x.amount||0);});
    this.subs.filter(s2=>s2.start_date>=dISO(from)&&(!bId||s2.branch_id===bId)).forEach(x=>{sSub[bIdx(x.start_date+'T12:00:00')]++;});
    const sAvg=sTot.map((v,i)=>sCnt[i]?v/sCnt[i]:0);
    const sNet=sTot.map((v,i)=>v-sOut[i]);
    this._miniData={total:sTot,count:sCnt,subs:sSub,visits:sVis,avg:sAvg,movin:sIn,movout:sOut,net:sNet};
    this.paintMiniCharts();
    const total=S.reduce((a,x)=>a+Number(x.total||0),0);
    const subsN=this.subs.filter(s=>s.start_date>=dISO(from)&&(!bId||s.branch_id===bId)).length;
    $('r-total').textContent=money(total);
    $('r-total-f').textContent=this.reportRange==='today'?'hoy':'últimos '+days+' días';
    $('r-count').textContent=S.length;
    $('r-subs').textContent=subsN;
    $('r-visits').textContent=CI.length;
    const movIn=MV.filter(m=>m.type==='in').reduce((a,x)=>a+Number(x.amount||0),0);
    const movOut=MV.filter(m=>m.type==='out').reduce((a,x)=>a+Number(x.amount||0),0);
    $('r-avg').textContent=S.length?money(total/S.length):'$0.00';
    $('r-movin').textContent=money(movIn);
    $('r-movout').textContent=money(movOut);
    $('r-net').textContent=money(total-movOut);
    // mini-gráfica dentro de la tarjeta + comparación vs período anterior
    try{
      const prevFrom=new Date(from.getTime()-days*864e5);
      let qp=sb.from('sales').select('total,created_at').gte('created_at',prevFrom.toISOString()).lt('created_at',from.toISOString());
      if(bId)qp=qp.eq('branch_id',bId);
      const {data:PS}=await qp;
      const prevTotal=(PS||[]).reduce((a,x)=>a+Number(x.total||0),0);
      const tr=$('r-trend');
      if(tr&&prevTotal>0){
        const pct=Math.round((total-prevTotal)/prevTotal*100);
        tr.style.display='inline-block';
        tr.className='tag '+(pct>=0?'tag-green':'tag-red');
        tr.textContent=(pct>=0?'▲ +':'▼ ')+pct+'%';
      }
      const buckets=days===1?12:days; // hoy: por bloques de 2h
      const vals=Array(buckets).fill(0);
      S.forEach(s=>{
        const d=new Date(s.created_at);
        const i=days===1?Math.min(11,Math.floor(d.getHours()/2)):Math.min(buckets-1,Math.floor((d-from)/864e5));
        vals[i]+=Number(s.total||0);
      });
      const mx=Math.max(1,...vals);const W=100,H=44;
      const pts=vals.map((v,i)=>(i/(buckets-1)*W).toFixed(1)+','+(H-4-(v/mx*(H-10))).toFixed(1));
      $('r-spark').innerHTML=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:100%;display:block">
        <polygon points="0,${H} ${pts.join(' ')} ${W},${H}" fill="rgba(249,115,22,.14)"/>
        <polyline points="${pts.join(' ')}" fill="none" stroke="var(--orange)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>`;
    }catch(e){}
    $('r-range-lbl').textContent=fdate(from)+' → '+fdate(new Date());
    // barras por día
    const byDay={};for(let i=0;i<days;i++){const d=new Date(from.getTime()+i*864e5);byDay[dISO(d)]=0;}
    S.forEach(s=>{const k=dISO(s.created_at);if(k in byDay)byDay[k]+=Number(s.total||0);});
    const entries=Object.entries(byDay);
    const max=Math.max(1,...entries.map(([,v])=>v));
    $('r-bars').innerHTML='<div style="display:flex;align-items:flex-end;gap:'+(days>7?'3px':'10px')+';height:190px;padding-top:10px;">'+
      entries.map(([k,v])=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;" title="${k}: ${money(v)}">
        ${v?`<div style="font-size:10px;font-weight:700;color:var(--muted)">${days>7?'':money(v).replace('.00','')}</div>`:''}
        <div style="width:100%;max-width:44px;background:var(--orange);border-radius:8px 8px 4px 4px;height:${Math.max(3,Math.round(v/max*140))}px;${v?'':'background:#EFEFEF;'}"></div>
        <div style="font-size:10px;font-weight:700;color:var(--muted)">${days>7?new Date(k+'T12:00:00').getDate():new Date(k+'T12:00:00').toLocaleDateString('es-MX',{weekday:'short'})}</div>
      </div>`).join('')+'</div>';
    // donut
    const by=(m)=>S.filter(x=>x.payment_method===m).reduce((a,x)=>a+Number(x.total||0),0);
    const segs=[['Efectivo',by('cash'),'#22C55E'],['Tarjeta',by('card'),'#F97316'],['Transferencia',by('transfer'),'#3B82F6']].filter(x=>x[1]>0);
    const segTotal=segs.reduce((a,x)=>a+x[1],0)||1;
    let acc=0;
    const arcs=segs.map(([l,v,c])=>{const f=v/segTotal;const s=acc;acc+=f;return `<circle r="15.9" cx="21" cy="21" fill="none" stroke="${c}" stroke-width="6" stroke-dasharray="${(f*100).toFixed(2)} ${(100-f*100).toFixed(2)}" stroke-dashoffset="${(25-s*100).toFixed(2)}"></circle>`;}).join('');
    $('r-donut').innerHTML=segs.length?`
      <div style="display:flex;align-items:center;gap:24px;">
        <svg viewBox="0 0 42 42" style="width:150px;height:150px;transform:rotate(0deg)">${arcs}</svg>
        <div style="flex:1">${segs.map(([l,v,c])=>`<div class="row-line"><span class="k"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${c};margin-right:8px"></span>${l}</span><span class="v">${money(v)}</span></div>`).join('')}</div>
      </div>`:'<div class="stub" style="padding:26px"><p>Sin ventas en el período.</p></div>';
    // horas
    const hours=Array(24).fill(0);CI.forEach(c=>{hours[new Date(c.created_at).getHours()]++;});
    const hmax=Math.max(1,...hours);
    const hlbl=(h)=>h===12?'12pm':(h<12?h+'am':(h-12)+'pm');
    $('r-hours').innerHTML='<div style="display:flex;align-items:flex-end;gap:2px;height:120px;">'+
      hours.slice(5,23).map((v,i)=>{const h=i+5;return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;" title="${hlbl(h)} — ${v} visita${v===1?'':'s'}">
        <div style="width:100%;background:${v?'var(--orange)':'#EFEFEF'};border-radius:4px;height:${Math.max(3,Math.round(v/hmax*90))}px;"></div>
        <div style="font-size:8.5px;font-weight:700;color:var(--muted)">${hlbl(h)}</div>
      </div>`;}).join('')+'</div>';
    // hombres vs mujeres — cruza los accesos del período con el género de la ficha
    const genderEl=$('r-gender');
    if(genderEl){
      const seenCust=new Set();let men=0,women=0,unknown=0;
      CI.forEach(ci=>{
        const cust=this.customers.find(x=>x.id===ci.customer_id||(ci.member_id&&x.profile_id===ci.member_id));
        if(!cust||seenCust.has(cust.id))return;seenCust.add(cust.id);
        if(cust.gender==='M')men++;else if(cust.gender==='F')women++;else unknown++;
      });
      const totG=men+women+unknown;
      if(!totG){genderEl.innerHTML='<div class="stub" style="padding:26px"><p>Sin accesos en el período.</p></div>';}
      else{
        const pct=(n)=>Math.round(n/totG*100);
        genderEl.innerHTML=`<div style="display:flex;flex-direction:column;gap:10px;padding-top:6px;">
          <div><div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:5px"><span>Hombres</span><span>${men} · ${pct(men)}%</span></div><div style="height:10px;background:#EFEFEF;border-radius:100px;overflow:hidden"><div style="height:100%;width:${pct(men)}%;background:#3B82F6;border-radius:100px"></div></div></div>
          <div><div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:5px"><span>Mujeres</span><span>${women} · ${pct(women)}%</span></div><div style="height:10px;background:#EFEFEF;border-radius:100px;overflow:hidden"><div style="height:100%;width:${pct(women)}%;background:#EC4899;border-radius:100px"></div></div></div>
          ${unknown?`<div><div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:5px;color:var(--muted)"><span>Sin dato</span><span>${unknown} · ${pct(unknown)}%</span></div><div style="height:10px;background:#EFEFEF;border-radius:100px;overflow:hidden"><div style="height:100%;width:${pct(unknown)}%;background:#D1D5DB;border-radius:100px"></div></div></div>`:''}
        </div>`;
      }
    }
    // por empleado
    const byStaff={};
    S.forEach(s=>{const k=s.sold_by||s.staff_id;if(!k)return;byStaff[k]=byStaff[k]||{n:0,t:0,m:0};byStaff[k].n++;byStaff[k].t+=Number(s.total||0);});
    this.subs.filter(s=>s.start_date>=dISO(from)&&s.sold_by).forEach(s=>{byStaff[s.sold_by]=byStaff[s.sold_by]||{n:0,t:0,m:0};byStaff[s.sold_by].m++;});
    const staffRows=Object.entries(byStaff).sort((a,b)=>b[1].t-a[1].t);
    $('r-staff').innerHTML=staffRows.length?`<table><thead><tr><th>Empleado</th><th>Órdenes</th><th>Membresías</th><th>Total</th></tr></thead><tbody>${
      staffRows.map(([id,v])=>`<tr><td style="font-weight:700">${esc(this.profName(id))}</td><td>${v.n}</td><td>${v.m}</td><td style="font-weight:800;color:var(--orange)">${money(v.t)}</td></tr>`).join('')
    }</tbody></table>`:'<div class="stub" style="padding:26px"><p>Sin ventas en el período.</p></div>';
    // turnos
    $('r-shifts').innerHTML=SH.length?`<table><thead><tr><th>Abrió</th><th>Empleado</th><th>Cerró</th><th>Esperado</th><th>Contado</th><th>Diferencia</th><th>Fondo</th></tr></thead><tbody>${
      SH.map(s=>{const d=s.counted_cash!=null&&s.expected_cash!=null?Number(s.counted_cash)-Number(s.expected_cash):null;
      return `<tr><td>${fdate(s.opened_at)} ${ftime(s.opened_at)}</td><td style="font-weight:700">${esc(this.profName(s.staff_id))}</td><td>${s.closed_at?ftime(s.closed_at):'<span class="tag tag-green">Abierto</span>'}</td><td>${s.expected_cash!=null?money(s.expected_cash):'—'}</td><td>${s.counted_cash!=null?money(s.counted_cash):'—'}</td><td>${d==null?'—':(d===0?'<span class="tag tag-green">Cuadró</span>':(d>0?'<span class="tag tag-orange">+'+money(d)+'</span>':'<span class="tag tag-red">'+money(d)+'</span>'))}</td><td>${s.fund_shortage?'<span class="tag tag-red" title="'+esc(s.fund_shortage_note||'')+'">Faltante al abrir</span>':'<span class="tag tag-green">$400 ✓</span>'}</td></tr>`;}).join('')
    }</tbody></table>`:'<div class="stub" style="padding:20px"><p>Sin turnos registrados.</p></div>';
  },
  _empSales:[],_empSubs:[],
  async runEmpReport(){
    const emp=$('emp-sel').value,from=$('emp-from').value,to=$('emp-to').value;
    const box=$('emp-report');
    if(!emp){box.innerHTML='<span style="color:var(--red);font-weight:600">Primero elige al empleado.</span>';return;}
    box.innerHTML='Cargando...';
    const bId=this.branch?this.branch.id:null;
    let S=[],SU=[],SH=[];
    try{
      let q=sb.from('sales').select('*').eq('sold_by',emp).gte('created_at',from+'T00:00:00').lte('created_at',to+'T23:59:59').order('created_at',{ascending:false});
      if(bId)q=q.eq('branch_id',bId);
      const {data}=await q;S=data||[];
      let q2=sb.from('subscriptions').select('*').eq('sold_by',emp).gte('start_date',from).lte('start_date',to).order('start_date',{ascending:false});
      if(bId)q2=q2.eq('branch_id',bId);
      const {data:d2}=await q2;SU=d2||[];
      let q3=sb.from('cash_shifts').select('*').eq('staff_id',emp).gte('opened_at',from+'T00:00:00').lte('opened_at',to+'T23:59:59').order('opened_at',{ascending:false});
      if(bId)q3=q3.eq('branch_id',bId);
      const {data:d3}=await q3;SH=d3||[];
    }catch(e){box.innerHTML='Sin conexión — inténtalo con internet.';return;}
    this._empSales=S;this._empSubs=SU;this._empShifts=SH;
    const name=this.profName(emp);
    const total=S.reduce((a,x)=>a+Number(x.total||0),0);
    const by=(m)=>S.filter(x=>x.payment_method===m).reduce((a,x)=>a+Number(x.total||0),0);
    box.innerHTML=`
      <div class="cards" style="margin-bottom:16px;">
        <div class="card" style="background:var(--orange-soft);"><div class="lbl">Total vendido</div><div class="val" style="color:var(--orange-dark)">${money(total)}</div><div class="foot">${esc(name)} · ${fdate(from)} → ${fdate(to)}</div></div>
        <div class="card"><div class="lbl">Órdenes</div><div class="val">${S.length}</div><div class="foot">ventas cobradas</div></div>
        <div class="card"><div class="lbl">Membresías</div><div class="val">${SU.length}</div><div class="foot">vendidas o renovadas</div></div>
        <div class="card"><div class="lbl">Desglose</div><div style="margin-top:12px;font-size:13.5px;font-weight:600;line-height:1.9;">Efectivo <b>${money(by('cash'))}</b><br>Tarjeta <b>${money(by('card'))}</b><br>Transf. <b>${money(by('transfer'))}</b></div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;">
        <div><div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:10px">Membresías que vendió</div>
        ${SU.length?`<table><thead><tr><th>Cliente</th><th>Plan</th><th>Cobró</th><th>Fecha</th></tr></thead><tbody>${SU.map(s=>`<tr><td style="font-weight:700">${esc(this.custName(s.customer_id))}</td><td>${esc(this.planName(s.plan_id))}</td><td style="font-weight:800;color:var(--orange)">${s.price_paid!=null?money(s.price_paid):'—'}</td><td style="color:var(--muted)">${fdate(s.start_date)}</td></tr>`).join('')}</tbody></table>`:'<div style="color:var(--muted);font-size:13px;font-weight:500">Ninguna en este período.</div>'}</div>
        <div><div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:10px">Todas sus ventas</div>
        ${S.length?`<table><thead><tr><th>Fecha</th><th>Cliente</th><th>Qué vendió</th><th>Total</th><th>Pago</th></tr></thead><tbody>${S.slice(0,25).map(v=>`<tr><td style="color:var(--muted)">${fdate(v.created_at)} ${ftime(v.created_at)}</td><td style="font-weight:700">${esc(this.custName(v.customer_id))}</td><td style="font-size:12.5px">${esc(v.concept||'—')}</td><td style="font-weight:800;color:#16A34A">${money(v.total)}</td><td><span class="tag tag-gray">${PAY_LABEL[v.payment_method]||'—'}</span></td></tr>`).join('')}</tbody></table>`:'<div style="color:var(--muted);font-size:13px;font-weight:500">Sin ventas en este período.</div>'}</div>
      </div>
      <div style="margin-top:18px"><div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:10px">Sus turnos de caja (${SH.length})</div>
      ${SH.length?`<table><thead><tr><th>Abrió</th><th>Cerró</th><th>Fondo</th><th>Esperado</th><th>Contado</th><th>Diferencia</th></tr></thead><tbody>${SH.map(s=>{const d=s.counted_cash!=null&&s.expected_cash!=null?Number(s.counted_cash)-Number(s.expected_cash):null;return `<tr><td>${fdate(s.opened_at)} ${ftime(s.opened_at)}</td><td>${s.closed_at?ftime(s.closed_at):'<span class="tag tag-green">Abierto</span>'}</td><td>${money(s.opening_cash)}</td><td>${s.expected_cash!=null?money(s.expected_cash):'—'}</td><td>${s.counted_cash!=null?money(s.counted_cash):'—'}</td><td>${d==null?'—':(d===0?'<span class="tag tag-green">Cuadró</span>':(d>0?'<span class="tag tag-orange">+'+money(d)+'</span>':'<span class="tag tag-red">'+money(d)+'</span>'))}</td></tr>`;}).join('')}</tbody></table>`:'<div style="color:var(--muted);font-size:13px;font-weight:500">Sin turnos en este período.</div>'}</div>`;
  },
  exportEmpCSV(){
    const emp=$('emp-sel').value;
    if(!emp||!this._empSales){toast('Primero genera el reporte.',true);return;}
    const name=this.profName(emp).replace(/\s+/g,'_');
    csvExport('reporte_'+name,['Fecha','Hora','Cliente','Concepto','Total','Método','Referencia'],
      this._empSales.map(s=>[fdate(s.created_at),ftime(s.created_at),this.custName(s.customer_id),s.concept||'',Number(s.total||0),PAY_LABEL[s.payment_method]||'',s.reference||s.payment_reference||'']));
  },
  exportSalesCSV(){
    const bn=(id)=>(this.branches.find(b=>b.id===id)||{}).name||'';
    csvExport('ventas_volten',['# Venta','Fecha','Hora','Cliente','Concepto','Total','Método','Referencia','Sucursal','Atendió'],
      this._repSales.map(s=>[String(s.id||'').slice(0,8),fdate(s.created_at),ftime(s.created_at),this.custName(s.customer_id),s.concept||'',Number(s.total||0),PAY_LABEL[s.payment_method]||s.payment_method,s.reference||s.payment_reference||'',bn(s.branch_id),this.profName(s.sold_by||s.staff_id)]));
  },
  exportShiftsCSV(){
    csvExport('turnos_volten',['Abrió','Empleado','Cerró','Fondo','Esperado','Contado','Diferencia'],
      this._repShifts.map(s=>[fdate(s.opened_at)+' '+ftime(s.opened_at),this.profName(s.staff_id),s.closed_at?fdate(s.closed_at)+' '+ftime(s.closed_at):'abierto',Number(s.opening_cash||0),s.expected_cash!=null?Number(s.expected_cash):'',s.counted_cash!=null?Number(s.counted_cash):'',s.counted_cash!=null&&s.expected_cash!=null?Number(s.counted_cash)-Number(s.expected_cash):'']));
  },

  /* ═══════ PERSONAL ═══════ */
  staffBranches:[],
  /* ═══════ EJERCICIOS (biblioteca global con video) ═══════ */
  exCat:[],exCatQ:'',
  view_exercises(){
    if(this.role!=='admin')return '<div class="panel"><div class="stub"><div class="st">Solo el administrador</div></div></div>';
    return `
    <div class="topbar">
      <div><h1>Ejercicios</h1><div class="sub">Video de referencia — lo ven todos los clientes en su rutina</div></div>
      <input class="inp" style="width:260px" placeholder="Buscar ejercicio..." oninput="Pos.exCatQ=this.value;Pos.renderExCat()">
    </div>
    <div class="panel"><div id="ex-cat-list">Cargando...</div></div>`;
  },
  async after_exercises(){
    if(this.role!=='admin')return;
    try{
      const {data}=await sb.from('exercise_catalog').select('id,name,category,muscle_groups,video_url').order('name');
      this.exCat=data||[];
    }catch(e){}
    this.renderExCat();
  },
  renderExCat(){
    const el=$('ex-cat-list');if(!el)return;
    const q=(this.exCatQ||'').toLowerCase();
    const list=q?this.exCat.filter(x=>(x.name||'').toLowerCase().includes(q)):this.exCat;
    el.innerHTML=list.length?`<table><thead><tr><th>Ejercicio</th><th>Categoría</th><th>Video</th><th></th></tr></thead><tbody>${
      list.map(x=>`<tr><td style="font-weight:700">${esc(x.name)}</td><td>${esc(x.muscle_groups||x.category||'—')}</td>
        <td>${x.video_url?'<span class="tag tag-green">Con video</span>':'<span class="tag tag-gray">Sin video</span>'}</td>
        <td style="text-align:right;white-space:nowrap">
          <input type="file" accept="video/*" id="exvid-${x.id}" style="display:none" onchange="Pos.uploadExVideo('${x.id}')">
          <button class="btn-xs btn" style="background:var(--gray)" onclick="document.getElementById('exvid-${x.id}').click()">${x.video_url?'Reemplazar':'+ Subir video'}</button>
          ${x.video_url?`<button class="btn-xs btn btn-ghost" onclick="Pos.removeExVideo('${x.id}')">Quitar</button>`:''}
        </td></tr>`).join('')
    }</tbody></table>`:'<div class="stub"><div class="st">Sin ejercicios</div><p>El catálogo se siembra desde Supabase (exercise_catalog).</p></div>';
  },
  async uploadExVideo(id){
    const inp=$('exvid-'+id);const f=inp&&inp.files[0];if(!f)return;
    if(!navigator.onLine){toast('Para subir video necesitas internet.',true);return;}
    toast('Subiendo video...');
    const ext=(f.name.split('.').pop()||'mp4').toLowerCase();
    const path='exercises/'+id+'.'+ext;
    const {error:upErr}=await sb.storage.from('avatars').upload(path,f,{upsert:true});
    if(upErr){toast(/bucket|not found/i.test(upErr.message||'')?'Corre pos_migration3.sql (bucket avatars).':'Error: '+upErr.message,true);return;}
    const {data:pub}=sb.storage.from('avatars').getPublicUrl(path);
    const video_url=pub&&pub.publicUrl;
    const r=await Q.update('exercise_catalog',{id},{video_url});
    if(r.error){toast(/video_url/i.test(r.error.message||'')?'Corre pos_migration8.sql primero.':'Error: '+r.error.message,true);return;}
    const ex=this.exCat.find(x=>x.id===id);if(ex)ex.video_url=video_url;
    toast('Video guardado ✓ — ya lo ven los clientes en su rutina');this.renderExCat();
  },
  async removeExVideo(id){
    const r=await Q.update('exercise_catalog',{id},{video_url:null});
    if(r.error){toast('Error: '+r.error.message,true);return;}
    const ex=this.exCat.find(x=>x.id===id);if(ex)ex.video_url=null;
    this.renderExCat();
  },

  view_staff(){
    if(this.role!=='admin')return '<div class="panel"><div class="stub"><div class="st">Solo el administrador</div></div></div>';
    return `
    <div class="topbar">
      <div><h1>Personal</h1><div class="sub">Cajeras, encargados, coaches, limpieza y contadores</div></div>
      <button class="btn btn-primary" onclick="Pos.staffModal()">+ Nuevo empleado</button>
    </div>
    <div class="panel">
      <table><thead><tr><th></th><th>Nombre</th><th>Rol</th><th>Correo / usuario</th><th>Sucursal</th><th>Desde</th><th></th></tr></thead>
      <tbody id="staff-tbody">${this.staffRows()}</tbody></table>
      <p style="font-size:12px;color:var(--muted);font-weight:500;margin-top:14px">Los <b>coaches</b> que des de alta aquí aparecen automáticamente en "Elige tu entrenador" dentro de la app, en su sucursal. El <b>contador</b> solo puede ver Reportes. Para borrar una cuenta por completo se hace desde el panel de Supabase — aquí puedes quitarle el rol.</p>
    </div>`;
  },
  staffRows(){
    const staff=this.appProfiles.filter(p=>p.role&&p.role!=='member');
    return staff.map(p=>{
      const sbr=this.staffBranches.find(x=>x.staff_id===p.id);
      const br=sbr?this.branches.find(b=>b.id===sbr.branch_id):null;
      return `<tr>
      <td style="width:46px"><div class="av2" style="width:36px;height:36px;border-radius:50%;background:#E5E7EB;color:#6B7280;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;overflow:hidden;">${p.avatar_url?'<img src="'+esc(p.avatar_url)+'" style="width:100%;height:100%;object-fit:cover" alt="">':esc((p.full_name||'?')[0].toUpperCase())}</div></td>
      <td style="font-weight:700">${esc(p.full_name||'—')}</td>
      <td><span class="tag ${p.role==='admin'?'tag-dark':(p.role==='coach'?'tag-orange':'tag-gray')}">${ROLE_LABEL[p.role]||p.role}</span></td>
      <td style="color:var(--muted)">${esc(p.email||'—')}</td>
      <td>${br?esc(br.name):'Todas'}</td>
      <td style="color:var(--muted)">${fdate(p.created_at)}</td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn-xs btn" style="background:var(--gray)" onclick="Pos.staffEditModal('${p.id}')">Editar</button>
        ${p.id!==this.user.id&&p.role!=='admin'?`<button class="btn-xs btn btn-danger" onclick="Pos.removeStaff('${p.id}')">Quitar</button>`:''}
      </td></tr>`;
    }).join('');
  },
  async removeStaff(id){
    const p=this.appProfiles.find(x=>x.id===id);if(!p)return;
    if(!confirm('¿Quitar a '+(p.full_name||'esta persona')+' del personal? Ya no podrá entrar al POS ni saldrá como coach. (La cuenta sigue existiendo; para borrarla del todo se hace en Supabase.)'))return;
    try{await sb.from('staff_branches').delete().eq('staff_id',id);}catch(e){}
    if(p.role==='coach'){try{await sb.from('coach_profiles').delete().eq('profile_id',id);}catch(e){}}
    const {error}=await sb.from('profiles').update({role:'member'}).eq('id',id);
    if(error){toast('Error: '+error.message,true);return;}
    p.role='member';cset('appProfiles',this.appProfiles);
    toast('Quitado del personal ✓');this.after_staff();
  },
  async after_staff(){
    // recarga datos y actualiza SOLO la tabla (sin re-render completo, que causaba ciclo infinito)
    try{
      const {data}=await sb.from('staff_branches').select('*');
      if(data)this.staffBranches=data;
      const {data:profs}=await sb.from('profiles').select('*');
      if(profs){this.appProfiles=profs;cset('appProfiles',profs);}
    }catch(e){}
    const tb=$('staff-tbody');if(tb)tb.innerHTML=this.staffRows();
  },
  staffEditModal(id){
    const p=this.appProfiles.find(x=>x.id===id);if(!p)return;
    const sbr=this.staffBranches.find(x=>x.staff_id===id);
    openModal(`
      <h3>Editar empleado</h3><p class="msub">${esc(p.email||'')}</p>
      <div class="field"><label>Nombre completo</label><input class="inp" id="se-name" value="${esc(p.full_name||'')}"></div>
      <div class="frow">
        <div class="field"><label>Rol</label><select class="inp" id="se-role">
          ${['cajera','encargado','coach','limpieza','contador','admin'].map(r=>`<option value="${r}" ${p.role===r?'selected':''}>${ROLE_LABEL[r]}</option>`).join('')}
        </select></div>
        <div class="field"><label>Sucursal</label><select class="inp" id="se-branch">${this.branches.map(b=>`<option value="${b.id}" ${sbr&&sbr.branch_id===b.id?'selected':''}>${esc(b.name)}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label>Foto (se ve en el POS y en la app si es coach)</label><input class="inp" type="file" id="se-photo" accept="image/*" style="padding-top:11px"></div>
      <div class="frow">
        <div class="field"><label>Entra a trabajar</label><input class="inp" type="time" id="se-shift-start" value="${esc(p.shift_start||'')}"></div>
        <div class="field"><label>Sale de trabajar</label><input class="inp" type="time" id="se-shift-end" value="${esc(p.shift_end||'')}"></div>
      </div>
      <p style="font-size:12px;color:var(--muted);font-weight:500;margin:-8px 0 14px">Con esto, en "Adentro ahora" de Accesos se sabe que ya salió pasada su hora, sin que tenga que volver a marcar.</p>
      <div id="se-coach-price" class="${p.role==='coach'?'':'hidden'}">
        <div class="frow">
          <div class="field"><label>Precio del coach (se ve en la app)</label><input class="inp" type="number" id="se-price" value="${(this.coachProfiles.find(x=>x.profile_id===id)||{}).monthly_price||''}" placeholder="500"></div>
          <div class="field"><label>Por</label><select class="inp" id="se-period"><option value="mes">Mes</option><option value="semana">Semana</option></select></div>
        </div>
      </div>
      <button class="btn btn-primary btn-block" id="se-save" onclick="Pos.saveStaffEdit('${id}')">Guardar cambios</button>
    `);
    const roleSel=$('se-role');if(roleSel)roleSel.onchange=()=>{$('se-coach-price').classList.toggle('hidden',roleSel.value!=='coach');};
  },
  async saveStaffEdit(id){
    if(!navigator.onLine){toast('Necesitas internet para editar personal.',true);return;}
    $('se-save').disabled=true;$('se-save').textContent='Guardando...';
    const patch={full_name:$('se-name').value.trim(),role:$('se-role').value,
      shift_start:($('se-shift-start')&&$('se-shift-start').value)||null,
      shift_end:($('se-shift-end')&&$('se-shift-end').value)||null};
    // foto → bucket avatars (requiere pos_migration3.sql)
    const f=$('se-photo').files[0];
    if(f){
      const ext=(f.name.split('.').pop()||'jpg').toLowerCase();
      const path='staff/'+id+'_'+Date.now()+'.'+ext;
      const {error:upErr}=await sb.storage.from('avatars').upload(path,f,{upsert:true});
      if(upErr){toast(/bucket|not found/i.test(upErr.message||'')?'Para subir fotos corre pos_migration3.sql en Supabase.':'Foto: '+upErr.message,true);}
      else{const {data:pub}=sb.storage.from('avatars').getPublicUrl(path);if(pub)patch.avatar_url=pub.publicUrl;}
    }
    let {error}=await sb.from('profiles').update(patch).eq('id',id);
    if(error&&/shift_start|shift_end/i.test(error.message||'')){
      const p2={...patch};delete p2.shift_start;delete p2.shift_end;
      const r2=await sb.from('profiles').update(p2).eq('id',id);error=r2.error;
      if(!error)toast('Guardado — corre pos_migration9.sql para poder guardar su horario.',true);
    }
    if(error){toast(/constraint|check/i.test(error.message||'')?'Para el rol Contador corre pos_migration3.sql.':'Error: '+error.message,true);$('se-save').disabled=false;$('se-save').textContent='Guardar cambios';return;}
    try{
      await sb.from('staff_branches').delete().eq('staff_id',id);
      await sb.from('staff_branches').insert({staff_id:id,branch_id:$('se-branch').value});
    }catch(e){}
    // si es coach, refleja el nombre/foto/precio en el directorio de la app
    if(patch.role==='coach'){
      try{
        const {data:cp}=await sb.from('coach_profiles').select('certifications').eq('profile_id',id).maybeSingle();
        const certs=((cp&&cp.certifications)||[]).filter(x=>typeof x!=='string'||(x.indexOf('__name:')!==0&&x.indexOf('__avatar:')!==0&&x.indexOf('__period:')!==0));
        certs.push('__name:'+patch.full_name);
        if(patch.avatar_url)certs.push('__avatar:'+patch.avatar_url);
        const per=$('se-period')?$('se-period').value:'mes';
        certs.push('__period:'+per);
        const price=$('se-price')?Number($('se-price').value)||null:null;
        const cpPatch={certifications:certs};if(price!=null)cpPatch.monthly_price=price;
        if(cp)await sb.from('coach_profiles').update(cpPatch).eq('profile_id',id);
        else await sb.from('coach_profiles').insert(Object.assign({profile_id:id},cpPatch));
        const local=this.coachProfiles.find(x=>x.profile_id===id);
        if(local){if(price!=null)local.monthly_price=price;}else if(price!=null)this.coachProfiles.push({profile_id:id,monthly_price:price});
        cset('coachProfiles',this.coachProfiles);
      }catch(e){}
    }
    const p=this.appProfiles.find(x=>x.id===id);if(p)Object.assign(p,patch);
    cset('appProfiles',this.appProfiles);
    if(id===this.user.id&&patch.avatar_url)$('su-av').innerHTML='<img src="'+esc(patch.avatar_url)+'" alt="">';
    closeModal();toast('Empleado actualizado ✓');this.after_staff();
  },
  async removeCoachRole(id){
    const p=this.appProfiles.find(x=>x.id===id);if(!p)return;
    if(!confirm('¿Quitar a '+(p.full_name||'este coach')+' del directorio de coaches de la app? Su cuenta pasa a miembro normal.'))return;
    try{await sb.from('coach_profiles').delete().eq('profile_id',id);}catch(e){}
    const {error}=await sb.from('profiles').update({role:'member'}).eq('id',id);
    if(error){toast('Error: '+error.message,true);return;}
    p.role='member';cset('appProfiles',this.appProfiles);
    toast('Coach dado de baja — ya no aparece en la app');this.after_staff();
  },
  staffModal(){
    openModal(`
      <h3>Nuevo empleado</h3><p class="msub">Se crea su cuenta con acceso según el rol</p>
      <div class="field"><label>Nombre completo *</label><input class="inp" id="st-name" placeholder="Nombre y apellido"></div>
      <div class="frow">
        <div class="field"><label>Usuario o correo *</label><input class="inp" id="st-user" placeholder="ej. caja1 o correo@..."></div>
        <div class="field"><label>Contraseña *</label><input class="inp" id="st-pass" placeholder="mínimo 6 caracteres"></div>
      </div>
      <div class="frow">
        <div class="field"><label>Rol</label><select class="inp" id="st-role">
          <option value="cajera">Cajera / Cajero</option>
          <option value="encargado">Encargado de sucursal</option>
          <option value="coach">Coach (aparece en la app)</option>
          <option value="limpieza">Limpieza</option>
          <option value="contador">Contador (solo ve Reportes)</option>
          <option value="admin">Administrador</option>
        </select></div>
        <div class="field"><label>Sucursal</label><select class="inp" id="st-branch">${this.branches.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('')}</select></div>
      </div>
      <button class="btn btn-primary btn-block" id="st-save" onclick="Pos.createStaff()">Crear cuenta</button>
      <p style="font-size:12px;color:var(--muted);font-weight:500;margin-top:12px;text-align:center">Si pones solo usuario (sin @) se guarda como usuario@volten.pos — entra con ese usuario y su contraseña.</p>
    `);
  },
  async createStaff(){
    const name=$('st-name').value.trim(),u=$('st-user').value.trim(),pass=$('st-pass').value,role=$('st-role').value,branchId=$('st-branch').value;
    if(!name||!u||pass.length<6){toast('Llena nombre, usuario y contraseña (6+).',true);return;}
    if(!navigator.onLine){toast('Necesitas internet para crear cuentas.',true);return;}
    $('st-save').disabled=true;$('st-save').textContent='Creando...';
    const email=u.includes('@')?u:(u+'@volten.pos');
    const {data,error}=await sb2.auth.signUp({email,password:pass,options:{data:{full_name:name,role}}});
    $('st-save').disabled=false;$('st-save').textContent='Crear cuenta';
    if(error||!data.user){
      const msg=(error&&error.message)||'error desconocido';
      toast(/check|constraint|violates/i.test(msg)?'Falta correr pos_migration2.sql para habilitar roles nuevos.':'No se pudo crear: '+msg,true);
      return;
    }
    const uid=data.user.id;
    try{await sb.from('staff_branches').insert({staff_id:uid,branch_id:branchId});}catch(e){}
    if(role==='coach'){
      try{await sb.from('coach_profiles').insert({profile_id:uid,certifications:['__name:'+name]});}catch(e){}
    }
    this.appProfiles.push({id:uid,role,full_name:name,email,created_at:new Date().toISOString()});
    cset('appProfiles',this.appProfiles);
    openModal(`
      <h3>Cuenta creada ✓</h3><p class="msub">Anota o comparte estas credenciales</p>
      <div style="background:var(--gray);border-radius:16px;padding:20px;font-size:15px;font-weight:600;line-height:2;">
        Usuario: <b>${esc(u.includes('@')?email:u)}</b><br>Contraseña: <b>${esc(pass)}</b><br>Rol: <b>${ROLE_LABEL[role]}</b>
      </div>
      <button class="btn btn-primary btn-block" style="margin-top:18px" onclick="closeModal();Pos.go('staff')">Listo</button>
    `);
  },
};
// Candado anti doble-click: un guardado a la vez (evita stock/ventas duplicados)
['saveStockMove','saveCashMove','saveNewCustomer','savePlan','savePromo','saveAnn','saveFamily','saveCustomerEdit','doCloseShift','joinFamily','famAddMember','saveProduct'].forEach(m=>{
  const orig=Pos[m].bind(Pos);
  Pos[m]=async function(){ if(Pos._lock)return; Pos._lock=true; try{ return await orig.apply(Pos,arguments); } finally{ Pos._lock=false; } };
});
Pos.init();
</script>
